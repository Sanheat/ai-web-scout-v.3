# Render Blueprint — деплой AI Web Scout в один клик.
# В дашборде Render: New → Blueprint → подключить этот репозиторий.
# Значения секретов (sync:false) вводятся в UI Render при первом деплое.
#
# Сейчас: БЕСПЛАТНЫЙ план (для теста). Минусы free:
#   - сервис ЗАСЫПАЕТ при простое (первый заход ~30 сек);
#   - файловая система эфемерная → scout.db сбрасывается при редеплое.
# Для боевого always-on + постоянной БД: смените plan на "starter" и добавьте:
#   envVars: - key: SCOUT_DB
#              value: /data/scout.db
#   disk:
#     name: scout-data
#     mountPath: /data
#     sizeGB: 1
services:
  - type: web
    name: ai-web-scout
    runtime: docker
    plan: free
    envVars:
      - key: OPENAI_API_KEY   # ключ OpenAI для движка
        sync: false
      - key: SCOUT_PASSWORD   # пароль на вход (логин по умолчанию: scout)
        sync: false
      - key: SCOUT_USER       # логин (по умолчанию scout)
        value: scout

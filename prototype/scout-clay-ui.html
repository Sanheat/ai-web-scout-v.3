<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Web Scout — Clay-стиль (прототип)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     DESIGN TOKENS  (teal primary + orange accent — from ui-ux-pro-max)
     ============================================================ */
  :root {
    --primary:        #0D9488;
    --primary-600:    #0F766E;
    --primary-700:    #115E59;
    --on-primary:     #FFFFFF;
    --secondary:      #14B8A6;
    --accent:         #EA580C;
    --accent-600:     #C2410C;

    --bg:             #F7F8F9;
    --surface:        #FFFFFF;
    --surface-2:      #FBFCFD;
    --fg:             #0F172A;
    --fg-soft:        #475569;
    --muted:          #94A3B8;
    --muted-bg:       #F1F5F9;
    --border:         #E5E8EC;
    --border-strong:  #D3D9DF;
    --ring:           #0D9488;

    --found:          #0D9488;
    --found-bg:       #ECFDF8;
    --notfound:       #DC2626;
    --notfound-bg:    #FEF2F2;
    --pending:        #94A3B8;
    --running:        #2563EB;
    --running-bg:     #EFF4FF;

    --radius:         10px;
    --radius-sm:      7px;
    --shadow-sm:      0 1px 2px rgba(15,23,42,.05);
    --shadow:         0 4px 14px rgba(15,23,42,.08);
    --shadow-lg:      0 12px 40px rgba(15,23,42,.16);

    --row-h:          46px;
    --col-w:          260px;
    --domain-w:       300px;

    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  }

  /* Dark theme */
  html[data-theme="dark"] {
    --bg:             #0B1015;
    --surface:        #121922;
    --surface-2:      #0F161E;
    --fg:             #E6EDF3;
    --fg-soft:        #9FB0BE;
    --muted:          #6B7E8C;
    --muted-bg:       #1A222C;
    --border:         #232D38;
    --border-strong:  #313D49;
    --found-bg:       #0C2722;
    --notfound-bg:    #2A1414;
    --running-bg:     #11203A;
    --shadow-sm:      0 1px 2px rgba(0,0,0,.4);
    --shadow:         0 4px 14px rgba(0,0,0,.5);
    --shadow-lg:      0 12px 40px rgba(0,0,0,.6);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: .001ms !important; transition-duration: .001ms !important; }
  }

  button { font-family: inherit; cursor: pointer; }
  ::-webkit-scrollbar { height: 11px; width: 11px; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 8px; border: 3px solid transparent; background-clip: content-box; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); background-clip: content-box; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* ============================================================
     APP SHELL
     ============================================================ */
  .app { display: flex; flex-direction: column; height: 100vh; }

  /* ---- Top bar ---- */
  .topbar {
    display: flex; align-items: center; gap: 14px;
    height: 56px; padding: 0 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 30;
  }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 15px; letter-spacing: -.01em; }
  .brand .logo {
    width: 30px; height: 30px; border-radius: 8px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    display: grid; place-items: center; color: #fff; flex-shrink: 0;
    box-shadow: var(--shadow-sm);
  }
  .brand .logo svg { width: 18px; height: 18px; }
  .brand .ver { font-size: 11px; font-weight: 500; color: var(--muted); border: 1px solid var(--border); padding: 1px 6px; border-radius: 20px; margin-left: 2px; }

  .topbar .divider { width: 1px; height: 26px; background: var(--border); }

  .table-meta { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .table-meta .name { font-weight: 600; font-size: 14px; }
  .table-meta .chip {
    font-size: 12px; color: var(--fg-soft);
    background: var(--muted-bg); padding: 2px 9px; border-radius: 20px;
    white-space: nowrap;
  }

  .topbar .spacer { flex: 1; }

  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    height: 34px; padding: 0 13px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--fg);
    font-weight: 500; font-size: 13px;
    transition: background .15s, border-color .15s, transform .08s, box-shadow .15s;
    white-space: nowrap;
  }
  .btn svg { width: 16px; height: 16px; }
  .btn:hover { background: var(--muted-bg); border-color: var(--muted); }
  .btn:active { transform: translateY(1px); }
  .btn:focus-visible { outline: 2px solid var(--ring); outline-offset: 2px; }
  .btn.ghost { border-color: transparent; background: transparent; }
  .btn.ghost:hover { background: var(--muted-bg); }
  .btn.icon { padding: 0; width: 34px; justify-content: center; }
  .btn.primary { background: var(--primary); color: var(--on-primary); border-color: var(--primary); }
  .btn.primary:hover { background: var(--primary-600); border-color: var(--primary-600); }
  .btn.accent { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: var(--shadow-sm); }
  .btn.accent:hover { background: var(--accent-600); border-color: var(--accent-600); }
  .btn[disabled] { opacity: .5; pointer-events: none; }

  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: linear-gradient(135deg, #6366F1, #8B5CF6);
    color: #fff; font-weight: 600; font-size: 13px;
    display: grid; place-items: center;
  }

  /* ---- Sub toolbar ---- */
  .subbar {
    display: flex; align-items: center; gap: 8px;
    height: 46px; padding: 0 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 20;
  }
  .subbar .tab {
    display: inline-flex; align-items: center; gap: 7px;
    height: 30px; padding: 0 11px; border-radius: 7px;
    font-size: 13px; font-weight: 500; color: var(--fg-soft);
    border: 1px solid transparent;
  }
  .subbar .tab svg { width: 15px; height: 15px; }
  .subbar .tab.active { background: var(--muted-bg); color: var(--fg); }
  .subbar .tab:hover:not(.active) { background: var(--muted-bg); }
  .subbar .spacer { flex: 1; }
  .search {
    display: flex; align-items: center; gap: 7px;
    height: 30px; padding: 0 10px; border-radius: 7px;
    background: var(--muted-bg); border: 1px solid transparent;
    width: 200px;
  }
  .search:focus-within { background: var(--surface); border-color: var(--primary); }
  .search svg { width: 15px; height: 15px; color: var(--muted); flex-shrink: 0; }
  .search input { border: 0; background: transparent; outline: none; color: var(--fg); font-size: 13px; width: 100%; }

  .count-pill { font-size: 12px; color: var(--fg-soft); display: flex; align-items: center; gap: 5px; }
  .count-pill b { color: var(--fg); font-weight: 600; }

  /* ============================================================
     GRID  (the Clay-like table)
     ============================================================ */
  .grid-wrap { flex: 1; overflow: auto; position: relative; background: var(--bg); }
  .grid {
    display: grid;
    /* columns set via JS: domain col + N data cols + add-col */
    width: max-content;
    min-width: 100%;
  }

  .cell {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    min-height: var(--row-h);
    display: flex; align-items: center;
    position: relative;
  }

  /* --- header row --- */
  .hcell {
    position: sticky; top: 0; z-index: 12;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border-strong);
    min-height: 52px;
    padding: 0;
  }
  .hcell.corner { z-index: 16; left: 0; }

  /* domain (first) column sticky */
  .col-domain { position: sticky; left: 0; z-index: 8; background: var(--surface); box-shadow: 1px 0 0 var(--border); }
  .hcell.col-domain { z-index: 14; }

  .row-index {
    width: 38px; min-width: 38px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 11px; font-variant-numeric: tabular-nums;
    border-right: 1px solid var(--border);
    align-self: stretch;
  }

  /* ---- Domain header ---- */
  .domain-head { display: flex; align-items: center; gap: 9px; padding: 0 12px; width: 100%; }
  .domain-head .ic { width: 16px; height: 16px; color: var(--muted); }
  .domain-head .lbl { font-weight: 600; font-size: 12.5px; letter-spacing: .01em; text-transform: uppercase; color: var(--fg-soft); }
  .domain-head .spacer { flex: 1; }

  /* ---- Domain cell ---- */
  .domain-cell { display: flex; align-items: center; gap: 10px; padding: 0 12px; width: 100%; min-width: 0; }
  .favicon {
    width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0;
    display: grid; place-items: center; color: #fff; font-weight: 700; font-size: 11px;
    text-transform: uppercase;
  }
  .domain-cell .meta { min-width: 0; display: flex; flex-direction: column; line-height: 1.25; }
  .domain-cell .d-name { font-weight: 550; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .domain-cell .d-url { font-size: 11.5px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .domain-cell .d-status { margin-left: auto; flex-shrink: 0; }

  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot.ok { background: var(--found); }
  .dot.idle { background: var(--muted); }
  .dot.run { background: var(--running); animation: pulse 1.1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }

  /* ---- Data column header ---- */
  .data-head { width: 100%; padding: 8px 11px 7px; display: flex; flex-direction: column; gap: 5px; }
  .data-head .top { display: flex; align-items: center; gap: 7px; }
  .data-head .typeic {
    width: 20px; height: 20px; border-radius: 5px; flex-shrink: 0;
    display: grid; place-items: center; color: #fff;
  }
  .data-head .typeic svg { width: 12px; height: 12px; }
  .data-head .cname { font-weight: 600; font-size: 13px; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .data-head .menu-btn { width: 22px; height: 22px; border-radius: 5px; border: 0; background: transparent; color: var(--muted); display: grid; place-items: center; }
  .data-head .menu-btn:hover { background: var(--muted-bg); color: var(--fg); }
  .data-head .menu-btn svg { width: 15px; height: 15px; }

  .prompt-line {
    font-size: 11.5px; color: var(--fg-soft);
    background: var(--muted-bg); border: 1px solid transparent;
    border-radius: 6px; padding: 4px 8px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    cursor: text; transition: border-color .15s, background .15s;
    display: flex; align-items: center; gap: 6px;
  }
  .prompt-line:hover { border-color: var(--border-strong); background: var(--surface); }
  .prompt-line .pic { width: 12px; height: 12px; color: var(--primary); flex-shrink: 0; }
  .prompt-line .tmpl { color: var(--accent); font-weight: 500; }
  .prompt-line.empty { color: var(--muted); font-style: italic; }

  .data-head .foot { display: flex; align-items: center; gap: 6px; }
  .modeltag {
    font-size: 10.5px; font-weight: 500; color: var(--fg-soft);
    background: var(--surface); border: 1px solid var(--border);
    padding: 1px 7px; border-radius: 20px; display: inline-flex; align-items: center; gap: 4px;
  }
  .modeltag .gd { width: 6px; height: 6px; border-radius: 50%; background: var(--secondary); }
  .data-head .runcol {
    margin-left: auto;
    height: 24px; padding: 0 9px; border-radius: 6px;
    border: 1px solid var(--primary); color: var(--primary); background: transparent;
    font-size: 11.5px; font-weight: 600; display: inline-flex; align-items: center; gap: 5px;
  }
  .data-head .runcol:hover { background: var(--primary); color: #fff; }
  .data-head .runcol svg { width: 12px; height: 12px; }
  .data-head .progress {
    height: 3px; border-radius: 3px; background: var(--muted-bg); overflow: hidden; margin-top: 2px;
  }
  .data-head .progress > i { display: block; height: 100%; width: 0; background: var(--primary); transition: width .3s; }

  /* ---- Data cell ---- */
  .data-cell { width: 100%; padding: 0 12px; cursor: pointer; min-width: 0; }
  .data-cell:hover { background: var(--surface-2); }
  .data-cell .inner { display: flex; align-items: center; gap: 8px; width: 100%; padding: 7px 0; min-width: 0; }
  .cell-val { font-size: 13px; min-width: 0; overflow: hidden; }
  .cell-val .v { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cell-val .src {
    font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 4px; margin-top: 1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .cell-val .src svg { width: 11px; height: 11px; flex-shrink: 0; }

  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px;
    flex-shrink: 0;
  }
  .badge svg { width: 12px; height: 12px; }
  .badge.found  { color: var(--found); background: var(--found-bg); }
  .badge.notfound { color: var(--notfound); background: var(--notfound-bg); }
  .badge.running { color: var(--running); background: var(--running-bg); }
  .badge.queued { color: var(--muted); background: var(--muted-bg); }

  .cell-empty { color: var(--muted); font-size: 12px; }

  .spinner { width: 13px; height: 13px; border: 2px solid currentColor; border-right-color: transparent; border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* shimmer for running cells */
  .shimmer { height: 9px; border-radius: 4px; background: linear-gradient(90deg, var(--muted-bg) 25%, var(--border) 37%, var(--muted-bg) 63%); background-size: 400% 100%; animation: sh 1.3s infinite; }
  @keyframes sh { 0%{background-position:100% 0;} 100%{background-position:0 0;} }

  /* ---- Add column ---- */
  .addcol-head {
    position: sticky; top: 0; z-index: 11;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border-strong);
    border-right: 1px solid var(--border);
    min-width: 150px; width: 150px;
    display: flex; align-items: center; justify-content: center;
  }
  .addcol-head button {
    display: inline-flex; align-items: center; gap: 6px;
    height: 32px; padding: 0 12px; border-radius: 7px;
    border: 1px dashed var(--border-strong); background: transparent; color: var(--fg-soft);
    font-size: 12.5px; font-weight: 500;
  }
  .addcol-head button:hover { border-color: var(--primary); color: var(--primary); background: var(--found-bg); }
  .addcol-head button svg { width: 15px; height: 15px; }
  .addcol-body { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); background: var(--surface); }

  /* add-row footer */
  .addrow {
    grid-column: 1 / -1; position: sticky; left: 0;
    display: flex; align-items: center; gap: 8px;
    padding: 9px 14px; color: var(--fg-soft); font-size: 13px; font-weight: 500;
    background: var(--surface); border-bottom: 1px solid var(--border);
  }
  .addrow:hover { color: var(--primary); background: var(--surface-2); }
  .addrow svg { width: 16px; height: 16px; }

  /* ============================================================
     RUN STATUS BAR (pipeline)
     ============================================================ */
  .runbar {
    position: absolute; left: 50%; bottom: 22px; transform: translateX(-50%) translateY(20px);
    background: var(--surface); border: 1px solid var(--border-strong);
    border-radius: 12px; box-shadow: var(--shadow-lg);
    padding: 12px 16px; width: 460px; max-width: calc(100vw - 40px);
    opacity: 0; pointer-events: none; transition: opacity .25s, transform .25s; z-index: 40;
  }
  .runbar.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
  .runbar .rb-top { display: flex; align-items: center; gap: 9px; margin-bottom: 11px; }
  .runbar .rb-top .t { font-weight: 600; font-size: 13px; }
  .runbar .rb-top .sub { font-size: 12px; color: var(--muted); margin-left: auto; font-variant-numeric: tabular-nums; }
  .stages { display: flex; gap: 6px; }
  .stage { flex: 1; }
  .stage .bar { height: 4px; border-radius: 3px; background: var(--muted-bg); overflow: hidden; }
  .stage .bar > i { display: block; height: 100%; width: 0; background: var(--primary); transition: width .4s; }
  .stage.done .bar > i { width: 100% !important; background: var(--found); }
  .stage .lbl { font-size: 10.5px; color: var(--muted); margin-top: 5px; display: flex; align-items: center; gap: 4px; }
  .stage.active .lbl { color: var(--primary); font-weight: 600; }
  .stage.done .lbl { color: var(--found); }
  .stage .lbl svg { width: 11px; height: 11px; }
  .keyword-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
  .keyword-chips .kw { font-size: 11px; font-family: var(--mono); color: var(--primary-700); background: var(--found-bg); border: 1px solid var(--primary); border-radius: 5px; padding: 1px 7px; }

  /* ============================================================
     DRAWER  (cell detail)
     ============================================================ */
  .scrim { position: fixed; inset: 0; background: rgba(15,23,42,.45); opacity: 0; pointer-events: none; transition: opacity .25s; z-index: 50; }
  .scrim.show { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed; top: 0; right: 0; height: 100vh; width: 440px; max-width: 92vw;
    background: var(--surface); border-left: 1px solid var(--border);
    box-shadow: var(--shadow-lg); z-index: 60;
    transform: translateX(100%); transition: transform .28s cubic-bezier(.4,0,.2,1);
    display: flex; flex-direction: column;
  }
  .drawer.show { transform: translateX(0); }
  .drawer .dh { display: flex; align-items: center; gap: 10px; padding: 16px 18px; border-bottom: 1px solid var(--border); }
  .drawer .dh .favicon { width: 30px; height: 30px; border-radius: 8px; }
  .drawer .dh .t { font-weight: 600; font-size: 14px; }
  .drawer .dh .s { font-size: 12px; color: var(--muted); }
  .drawer .dh .x { margin-left: auto; width: 30px; height: 30px; border-radius: 7px; border: 0; background: var(--muted-bg); color: var(--fg-soft); display: grid; place-items: center; }
  .drawer .dh .x:hover { background: var(--border); }
  .drawer .db { padding: 18px; overflow-y: auto; flex: 1; }
  .dsection { margin-bottom: 20px; }
  .dsection .lbl { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin-bottom: 7px; }
  .dvalue { font-size: 14px; line-height: 1.5; padding: 12px 14px; background: var(--muted-bg); border-radius: 9px; border: 1px solid var(--border); }
  .dvalue.big { font-size: 16px; font-weight: 600; }
  .src-link { display: inline-flex; align-items: center; gap: 6px; color: var(--primary); font-size: 13px; text-decoration: none; font-weight: 500; word-break: break-all; }
  .src-link svg { width: 14px; height: 14px; flex-shrink: 0; }
  .src-link:hover { text-decoration: underline; }
  .prompt-box { font-size: 13px; line-height: 1.55; padding: 12px 14px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 9px; color: var(--fg-soft); }
  .prompt-box .tmpl { color: var(--accent); font-weight: 600; background: rgba(234,88,12,.1); padding: 0 3px; border-radius: 3px; }
  .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .meta-item { padding: 10px 12px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 9px; }
  .meta-item .k { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
  .meta-item .v { font-size: 13px; font-weight: 600; }
  .crawl-list { display: flex; flex-direction: column; gap: 6px; }
  .crawl-item { display: flex; align-items: center; gap: 8px; padding: 8px 11px; border: 1px solid var(--border); border-radius: 8px; font-size: 12.5px; }
  .crawl-item .pg { color: var(--muted); font-family: var(--mono); font-size: 11px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .crawl-item .tg { font-size: 10.5px; font-weight: 600; padding: 1px 7px; border-radius: 20px; flex-shrink: 0; }
  .crawl-item .tg.hit { color: var(--found); background: var(--found-bg); }
  .crawl-item .tg.skip { color: var(--muted); background: var(--muted-bg); }
  .crawl-item > svg { width: 15px; height: 15px; flex-shrink: 0; color: var(--muted); }
  .dvalue > svg { width: 20px; height: 20px; flex-shrink: 0; }
  .dsection .typeic svg { width: 13px; height: 13px; }
  .modeltag, .preset .pt, .preset .pd { white-space: nowrap; }

  /* ============================================================
     MODALS
     ============================================================ */
  .modal {
    position: fixed; inset: 0; z-index: 70;
    display: grid; place-items: center; padding: 20px;
    background: rgba(15,23,42,.5); opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .modal.show { opacity: 1; pointer-events: auto; }
  .modal .panel {
    background: var(--surface); border-radius: 14px; box-shadow: var(--shadow-lg);

  .type-opt .tt { font-weight: 600; font-size: 13px; }
  .type-opt .td { font-size: 11.5px; color: var(--muted); margin-top: 2px; line-height: 1.4; }

  .tmpl-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }

  /* toast */

  .toast {
    display: flex; align-items: center; gap: 9px;

/* ============================================================

function detectKind(name, prompt) {
  const s = (name + ' ' + prompt).toLowerCase();
  if (/email|почт|mail|e-mail/.test(s)) return 'email';
  if (/ceo|директор|founder|основат|руковод/.test(s)) return 'ceo';
  if (/phone|телефон|звон/.test(s)) return 'phone';
  if (/адрес|address|офис|город|location/.test(s)) return 'address';
  if (/3d|тур|тура|virtual|matterport/.test(s)) return 'tour';
  if (/instagram|соц|social|telegram|vk/.test(s)) return 'social';
  if (/сотрудник|employ|команд|team|штат/.test(s)) return 'size';
  return 'generic';
}

function pick(arr, seed){ return arr[Math.abs(hash(seed)) % arr.length]; }
function hash(s){ let h=0; for(let i=0;i<s.length;i++){ h=(h<<5)-h+s.charCodeAt(i); h|=0; } return h; }

function genCell(domain, col){
  const kind = col.kind;
  const cfg = DATA[kind] || DATA.generic;
  const r = (Math.abs(hash(domain.domain + col.id)) % 100) / 100;
  const found = r < cfg.found;
  if(!found) return { status:'notfound', value:null, sourceUrl:null, kind };
  const n = domain.domain.split('.')[0];
  let v = pick(cfg.vals, domain.domain + col.id).replace('{d}', domain.domain).replace(/{n}/g, n);
  const page = pick(cfg.page, domain.domain + col.id + 'p');
  return { status:'found', value:v, sourceUrl: 'https://' + domain.domain + page, kind, page };
}

  { id:'col2', name:'Имя руководителя', type:'ai',     prompt:'Кто генеральный директор или основатель компании? Верни только имя.', model:'gpt-4o-mini', cells:{}, status:'done', progress:1 },
  { id:'col3', name:'Есть ли 3D-тур',  type:'scrape', prompt:'Проверь, есть ли на сайте {{Website}} виртуальный 3D-тур (Matterport, Kuula, встроенный виджет)', model:'gpt-4o-mini', cells:{}, status:'done', progress:1 },
];
columns.forEach(c => { c.kind = detectKind(c.name, c.prompt); });

let colCounter = columns.length;
let domCounter = domains.length;
let searchQuery = '';

/* prefill first two columns with results, leave 3rd empty to demo "run" */
domains.forEach(d => {
  columns.forEach(c => {
    if(c.id === 'col3'){ c.cells[d.id] = { status:'empty' }; c.status='idle'; c.progress=0; }
    else c.cells[d.id] = genCell(d, c);
  });
});

/* ============================================================
   RENDER GRID
   ============================================================ */
const grid = document.getElementById('grid');

function visibleDomains(){
  if(!searchQuery) return domains;
  const q = searchQuery.toLowerCase();
  return domains.filter(d => d.domain.toLowerCase().includes(q) || d.name.toLowerCase().includes(q));
}

function render(){
  const vds = visibleDomains();
  // grid template: domain col + data cols + addcol
  grid.style.gridTemplateColumns =
    `var(--domain-w) ${columns.map(()=>'var(--col-w)').join(' ')} 150px`;

  let html = '';

  // ---- header row ----
  html += `<div class="cell hcell col-domain corner">
      <div class="domain-head">
        ${iconSpan(I.globe,'ic')}
        <span class="lbl">Домен</span>
        <span class="spacer"></span>
        <span class="badge queued" style="background:var(--muted-bg)">${domains.length}</span>
      </div></div>`;

  columns.forEach(col => {
    const t = COL_TYPES[col.type];
    const promptHtml = col.prompt
      ? highlightTmpl(escapeHtml(col.prompt))
      : '<span class="empty">Добавьте промпт…</span>';
    const pct = Math.round((col.progress||0)*100);
    html += `<div class="cell hcell" data-col="${col.id}">
      <div class="data-head">
        <div class="top">
          <span class="typeic" style="background:${t.color}">${t.icon}</span>
          <span class="cname" title="${escapeHtml(col.name)}">${escapeHtml(col.name)}</span>
          <button class="menu-btn" data-action="colmenu" data-col="${col.id}" aria-label="Меню столбца">${I.dots}</button>
        </div>
        <div class="prompt-line ${col.prompt?'':'empty'}" data-action="editprompt" data-col="${col.id}" title="Редактировать промпт">
          ${col.prompt?'<span class="pic">'+I.sparkles+'</span>':''}${promptHtml}
        </div>
        <div class="foot">
          <span class="modeltag"><span class="gd"></span>${col.model}</span>
          <button class="runcol" data-action="runcol" data-col="${col.id}">${I.play}<span>${col.status==='done'?'Обновить':'Запустить'}</span></button>
        </div>
        <div class="progress" style="${col.status==='running'?'':'visibility:hidden'}"><i style="width:${pct}%"></i></div>
      </div></div>`;
  });

  // add column header
  html += `<div class="cell addcol-head">
      <button data-action="addcol">${I.plus} Столбец</button>
    </div>`;

  // ---- data rows ----
  vds.forEach((d, ri) => {
    // domain cell
    const anyRun = columns.some(c => c.cells[d.id]?.status === 'running');
    const foundCount = columns.filter(c => c.cells[d.id]?.status==='found').length;
    html += `<div class="cell col-domain" data-dom="${d.id}">
        <div class="domain-cell">
          <span class="favicon" style="background:${d.color}">${d.name.charAt(0)}</span>
          <span class="meta">
            <span class="d-name">${escapeHtml(d.name)}</span>
            <span class="d-url">${escapeHtml(d.domain)}</span>
          </span>
          <span class="d-status">${anyRun?'<span class="dot run"></span>':foundCount?'<span class="dot ok"></span>':'<span class="dot idle"></span>'}</span>
        </div></div>`;

    columns.forEach(col => {
      const cell = col.cells[d.id] || { status:'empty' };
      html += `<div class="cell data-cell" data-action="opencell" data-col="${col.id}" data-dom="${d.id}">
          <div class="inner">${renderCellInner(cell)}</div>
        </div>`;
    });

    // add-col spacer cell
    html += `<div class="cell addcol-body"></div>`;
  });

  // ---- add row footer ----
  html += `<div class="addrow" data-action="addrows">${I.plus} Добавить домены</div>`;

  grid.innerHTML = html;
  updateCounts();
}

function renderCellInner(cell){
  switch(cell.status){
    case 'found':
      return `<div class="cell-val">
          <div class="v">${escapeHtml(cell.value)}</div>
          ${cell.sourceUrl?`<div class="src">${I.link}${escapeHtml(cell.sourceUrl.replace('https://',''))}</div>`:''}
        </div>`;
    case 'notfound':
      return `<span class="badge notfound">${I.x} Не найдено</span>`;
    case 'running':
      return `<span class="badge running"><span class="spinner"></span> Анализ…</span>`;
    case 'queued':
      return `<span class="badge queued">В очереди</span>`;
    default:
      return `<span class="cell-empty">—</span>`;
  }
}

function iconSpan(svg, cls){ return `<span class="${cls}">${svg}</span>`; }
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function highlightTmpl(s){ return s.replace(/\{\{[^}]+\}\}/g, m=>`<span class="tmpl">${m}</span>`); }

function updateCounts(){
  document.getElementById('cntDomains').textContent = domains.length;
  document.getElementById('cntCols').textContent = columns.length;
  let found = 0;
  columns.forEach(c => domains.forEach(d => { if(c.cells[d.id]?.status==='found') found++; }));
  document.getElementById('cntFound').textContent = found;
}

/* ============================================================
   EVENT DELEGATION
   ============================================================ */
grid.addEventListener('click', e => {
  const t = e.target.closest('[data-action]');
  if(!t) return;
  const action = t.dataset.action;
  const colId = t.dataset.col;
  const domId = t.dataset.dom;
  if(action==='addcol') openAddColumn();
  else if(action==='runcol') runColumn(colId);
  else if(action==='editprompt') openPromptPopover(colId, t);
  else if(action==='colmenu') openColMenu(colId, t);
  else if(action==='opencell') openCellDrawer(colId, domId);
  else if(action==='addrows') openImport();
});

/* ============================================================
   RUN COLUMN  (simulated pipeline)
   ============================================================ */
let running = false;

function runColumn(colId, opts={}){
  const col = columns.find(c=>c.id===colId);
  if(!col || running) { if(running) toast('Дождитесь завершения текущего запуска'); return; }
  runPipeline([col], opts);
}

function runAll(){
  if(running){ toast('Пайплайн уже выполняется'); return; }
  if(columns.length===0){ toast('Нет столбцов для запуска'); return; }
  runPipeline(columns.slice());
}

async function runPipeline(cols, opts={}){
  running = true;
  const vds = domains;
  const total = vds.length * cols.length;
  let done = 0;

  // reset cells to queued
  cols.forEach(col => { col.status='running'; col.progress=0; vds.forEach(d => col.cells[d.id] = { status:'queued' }); });
  render();

  // show runbar
  const runbar = document.getElementById('runbar');
  const s1=document.getElementById('stage1'), s2=document.getElementById('stage2'), s3=document.getElementById('stage3');
  [s1,s2,s3].forEach(s=>{ s.classList.remove('active','done'); s.querySelector('i').style.width='0'; });
  document.getElementById('kwChips').innerHTML='';
  runbar.classList.add('show');
  document.getElementById('rbTitle').textContent = cols.length>1 ? 'Запуск всех столбцов…' : 'Запуск: '+cols[0].name;
  document.getElementById('rbSub').textContent = `0 / ${total}`;

  // STAGE 1 — keywords
  s1.classList.add('active');
  document.getElementById('rbTitle').textContent = 'Stage 1 · Генерация ключевых слов…';
  await fillBar(s1.querySelector('i'), 700);
  const kws = keywordsFor(cols);
  const kwWrap = document.getElementById('kwChips');
  kwWrap.innerHTML = kws.map(k=>`<span class="kw">${k}</span>`).join('');
  s1.classList.remove('active'); s1.classList.add('done');

  // STAGE 2 — crawl
  s2.classList.add('active');
  document.getElementById('rbTitle').textContent = 'Stage 2 · Роботы обходят сайты…';
  await fillBar(s2.querySelector('i'), 1100);
  s2.classList.remove('active'); s2.classList.add('done');

  // STAGE 3 — LLM extraction (staggered, per cell)
  s3.classList.add('active');
  document.getElementById('rbTitle').textContent = 'Stage 3 · ИИ извлекает данные…';

  for(const d of vds){
    // mark running for this domain across cols
    for(const col of cols){
      col.cells[d.id] = { status:'running' };
    }
    render();
    await sleep(opts.fast?70:160);
    for(const col of cols){
      col.cells[d.id] = genCell(d, col);
      done++;
    }
    const pct = done/total;
    cols.forEach(col=>{ col.progress = pct; });
    s3.querySelector('i').style.width = (pct*100)+'%';
    document.getElementById('rbSub').textContent = `${done} / ${total}`;
    render();
    await sleep(opts.fast?40:90);
  }

  s3.classList.remove('active'); s3.classList.add('done');
  cols.forEach(col=>{ col.status='done'; col.progress=1; });
  render();
  document.getElementById('rbTitle').textContent = 'Готово · данные обновлены';
  let foundN=0; cols.forEach(col=>vds.forEach(d=>{ if(col.cells[d.id].status==='found') foundN++; }));
  toast(`Готово: найдено ${foundN} из ${total} значений`);
  await sleep(1400);
  runbar.classList.remove('show');
  running = false;
}

function keywordsFor(cols){
  const map = {
    email:['email','контакты','contact','связь','почта'],
    ceo:['команда','о компании','директор','team','founder'],
    phone:['телефон','контакты','phone','call'],
    address:['адрес','офис','контакты','address'],
    tour:['3d-тур','matterport','виртуальный','панорама','тур'],
    social:['instagram','соцсети','telegram','подписчики'],
    size:['команда','сотрудники','вакансии','о нас'],
    generic:['контакты','о компании','услуги','about'],
  };
  const set = new Set();
  cols.forEach(c => (map[c.kind]||map.generic).forEach(k=>set.add(k)));
  return [...set].slice(0,7);
}

function fillBar(el, ms){ return new Promise(res=>{ requestAnimationFrame(()=>{ el.style.transition=`width ${ms}ms ease`; el.style.width='100%'; }); setTimeout(res, ms+50); }); }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

/* ============================================================
   PROMPT POPOVER
   ============================================================ */
const popover = document.getElementById('popover');
let popCol = null;
function openPromptPopover(colId, anchor){
  const col = columns.find(c=>c.id===colId); if(!col) return;
  popCol = col;
  document.getElementById('popText').value = col.prompt;
  const r = anchor.getBoundingClientRect();
  popover.style.left = Math.min(r.left, window.innerWidth-340)+'px';
  popover.style.top = (r.bottom+6)+'px';
  popover.classList.add('show');
  setTimeout(()=>document.getElementById('popText').focus(), 50);
}
document.getElementById('popCancel').onclick = ()=>popover.classList.remove('show');
document.getElementById('popSave').onclick = ()=>{
  if(popCol){ popCol.prompt = document.getElementById('popText').value; popCol.kind = detectKind(popCol.name, popCol.prompt); render(); toast('Промпт обновлён'); }
  popover.classList.remove('show');
};
popover.querySelectorAll('.tmpl-chips button').forEach(b=>{
  b.onclick = ()=>{ const ta=document.getElementById('popText'); ta.value += (ta.value.endsWith(' ')||!ta.value?'':' ')+b.dataset.tmpl; ta.focus(); };
});
document.addEventListener('click', e=>{ if(popover.classList.contains('show') && !popover.contains(e.target) && !e.target.closest('[data-action=editprompt]')) popover.classList.remove('show'); });

/* ============================================================
   COLUMN MENU (simple)
   ============================================================ */
function openColMenu(colId, anchor){
  const col = columns.find(c=>c.id===colId); if(!col) return;
  const choice = confirmMenu(anchor, [
    {k:'run', label:'Запустить столбец'},
    {k:'edit', label:'Редактировать промпт'},
    {k:'dup', label:'Дублировать'},
    {k:'del', label:'Удалить столбец', danger:true},
  ]);
}
/* lightweight context menu */
let openMenuEl=null;
function confirmMenu(anchor, items){
  closeMenu();
  const m = document.createElement('div');
  m.style.cssText = `position:fixed;z-index:85;background:var(--surface);border:1px solid var(--border-strong);border-radius:10px;box-shadow:var(--shadow-lg);padding:5px;min-width:190px;`;
  const r = anchor.getBoundingClientRect();
  m.style.left = Math.min(r.left, window.innerWidth-210)+'px';
  m.style.top = (r.bottom+5)+'px';
  items.forEach(it=>{
    const b = document.createElement('button');
    b.textContent = it.label;
    b.style.cssText = `display:block;width:100%;text-align:left;border:0;background:transparent;padding:8px 10px;border-radius:7px;font-size:13px;font-weight:500;color:${it.danger?'var(--notfound)':'var(--fg)'};`;
    b.onmouseenter = ()=> b.style.background = it.danger?'var(--notfound-bg)':'var(--muted-bg)';
    b.onmouseleave = ()=> b.style.background = 'transparent';
    b.onclick = ()=>{ handleColAction(anchor.dataset.col, it.k); closeMenu(); };
    m.appendChild(b);
  });
  document.body.appendChild(m);
  openMenuEl = m;
  setTimeout(()=>document.addEventListener('click', closeMenuOnce), 0);
}
function closeMenuOnce(e){ if(openMenuEl && !openMenuEl.contains(e.target)){ closeMenu(); } }
function closeMenu(){ if(openMenuEl){ openMenuEl.remove(); openMenuEl=null; document.removeEventListener('click', closeMenuOnce); } }
function handleColAction(colId, k){
  const idx = columns.findIndex(c=>c.id===colId); if(idx<0) return;
  const col = columns[idx];
  if(k==='run') runColumn(colId);
  else if(k==='edit'){ const anchor = document.querySelector(`[data-action=editprompt][data-col="${colId}"]`); if(anchor) openPromptPopover(colId, anchor); }
  else if(k==='dup'){
    colCounter++;
    const nc = JSON.parse(JSON.stringify(col)); nc.id='col'+colCounter+'_'+Date.now(); nc.name=col.name+' (копия)'; nc.status='idle'; nc.progress=0;
    domains.forEach(d=> nc.cells[d.id]={status:'empty'});
    columns.splice(idx+1,0,nc); render(); toast('Столбец дублирован');
  }
  else if(k==='del'){ columns.splice(idx,1); render(); toast('Столбец удалён'); }
}

/* ============================================================
   CELL DRAWER
   ============================================================ */
const drawer = document.getElementById('drawer');
const scrim = document.getElementById('scrim');
function openCellDrawer(colId, domId){
  const col = columns.find(c=>c.id===colId);
  const dom = domains.find(d=>d.id===domId);
  if(!col || !dom) return;
  const cell = col.cells[domId] || {status:'empty'};
  const t = COL_TYPES[col.type];

  let resultHtml;
  if(cell.status==='found'){
    resultHtml = `<div class="dvalue big">${escapeHtml(cell.value)}</div>`;
  } else if(cell.status==='notfound'){
    resultHtml = `<div class="dvalue" style="color:var(--notfound);display:flex;align-items:center;gap:8px">${I.x} Данные не найдены на просмотренных страницах</div>`;
  } else {
    resultHtml = `<div class="dvalue" style="color:var(--muted)">Столбец ещё не запущен для этого домена</div>`;
  }

  // simulated crawl trail
  const pages = cell.status==='found'
    ? [ {p:cell.page||'/', hit:true}, {p:'/contacts', hit:false}, {p:'/about', hit:false} ]
    : [ {p:'/', hit:false}, {p:'/about', hit:false}, {p:'/contacts', hit:false}, {p:'/services', hit:false} ];

  drawer.innerHTML = `
    <div class="dh">
      <span class="favicon" style="background:${dom.color};width:30px;height:30px;border-radius:8px">${dom.name.charAt(0)}</span>
      <div><div class="t">${escapeHtml(dom.name)}</div><div class="s">${escapeHtml(dom.domain)}</div></div>
      <button class="x" id="drawerClose">${I.x}</button>
    </div>
    <div class="db">
      <div class="dsection">
        <div class="lbl">Столбец</div>
        <div style="display:flex;align-items:center;gap:9px">
          <span class="typeic" style="background:${t.color};width:24px;height:24px;border-radius:6px">${t.icon}</span>
          <div><div style="font-weight:600;font-size:14px">${escapeHtml(col.name)}</div>
          <div style="font-size:12px;color:var(--muted)">${t.label} · ${col.model}</div></div>
        </div>
      </div>

      <div class="dsection">
        <div class="lbl">Результат</div>
        ${resultHtml}
        ${cell.sourceUrl?`<div style="margin-top:9px"><a class="src-link" href="${cell.sourceUrl}" target="_blank" rel="noopener">${I.link}${escapeHtml(cell.sourceUrl)}</a></div>`:''}
      </div>

      <div class="dsection">
        <div class="lbl">Промпт столбца</div>
        <div class="prompt-box">${highlightTmpl(escapeHtml(col.prompt||'—'))}</div>
      </div>

      <div class="dsection">
        <div class="meta-grid">
          <div class="meta-item"><div class="k">Статус</div><div class="v" style="color:${cell.status==='found'?'var(--found)':cell.status==='notfound'?'var(--notfound)':'var(--muted)'}">${cell.status==='found'?'Найдено':cell.status==='notfound'?'Не найдено':'Ожидает'}</div></div>
          <div class="meta-item"><div class="k">Просмотрено страниц</div><div class="v">${pages.length}</div></div>
          <div class="meta-item"><div class="k">Модель</div><div class="v" style="font-size:12px">${col.model}</div></div>
          <div class="meta-item"><div class="k">Тип</div><div class="v" style="font-size:12px">${t.label}</div></div>
        </div>
      </div>

      <div class="dsection">
        <div class="lbl">След краулинга (Stage 2)</div>
        <div class="crawl-list">
          ${pages.map(pg=>`<div class="crawl-item">${I.globe}<span class="pg">${escapeHtml(dom.domain+pg.p)}</span><span class="tg ${pg.hit?'hit':'skip'}">${pg.hit?'совпадение':'просмотрено'}</span></div>`).join('')}
        </div>
      </div>
    </div>`;
  drawer.classList.add('show');
  scrim.classList.add('show');
  document.getElementById('drawerClose').onclick = closeDrawer;
}
function closeDrawer(){ drawer.classList.remove('show'); scrim.classList.remove('show'); }
scrim.onclick = ()=>{ closeDrawer(); };

      <button class="btn primary" id="ncCreate">${I.plus} Создать и запустить</button>
    </div>
  `);
  newColType='ai';

  modalPanel.querySelectorAll('[data-close]').forEach(b=>b.onclick=closeModal);
  modalPanel.querySelectorAll('#typeGrid .type-opt').forEach(o=>{
    o.onclick = ()=>{ modalPanel.querySelectorAll('.type-opt').forEach(x=>x.classList.remove('sel')); o.classList.add('sel'); newColType=o.dataset.type; };
  });
  modalPanel.querySelectorAll('.tmpl-chips button').forEach(b=>{
    b.onclick = ()=>{ const ta=modalPanel.querySelector('#ncPrompt'); ta.value += (ta.value && !ta.value.endsWith(' ')?' ':'')+b.dataset.tmpl; ta.focus(); };
  });
  modalPanel.querySelectorAll('.preset').forEach(p=>{
    p.onclick = ()=>{ const d=JSON.parse(p.dataset.preset); modalPanel.querySelector('#ncName').value=d.t; modalPanel.querySelector('#ncPrompt').value=d.p; };
  });
  modalPanel.querySelector('#ncCreate').onclick = ()=>{
    const name = modalPanel.querySelector('#ncName').value.trim() || 'Новый столбец';
    const prompt = modalPanel.querySelector('#ncPrompt').value.trim();
    const model = modalPanel.querySelector('#ncModel').value;
    colCounter++;
    const col = { id:'col'+colCounter+'_'+Date.now(), name, type:newColType, prompt, model, cells:{}, status:'idle', progress:0 };
    col.kind = detectKind(name, prompt);
    domains.forEach(d=> col.cells[d.id]={status:'empty'});
    columns.push(col);
    closeModal(); render();
    // scroll to new column
    document.getElementById('gridWrap').scrollLeft = 99999;
    if(prompt) runColumn(col.id);
    else toast('Столбец создан — добавьте промпт и запустите');
  };
}

        <button class="btn" id="impSheets" style="height:30px"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg> Из Google Sheets</button>
      </div>
    </div>
    <div class="mf">
      <button class="btn ghost" data-close>Отмена</button>
      <button class="btn primary" id="impAdd">Добавить домены</button>
    </div>
  `);
  modalPanel.querySelectorAll('[data-close]').forEach(b=>b.onclick=closeModal);
  modalPanel.querySelector('#impCsv').onclick = ()=>toast('Демо: загрузка CSV (макет)');
  modalPanel.querySelector('#impSheets').onclick = ()=>toast('Демо: импорт из Google Sheets (макет)');
  modalPanel.querySelector('#impAdd').onclick = ()=>{
    const raw = modalPanel.querySelector('#impText').value.split(/[\n,]/).map(s=>s.trim().replace(/^https?:\/\//,'').replace(/\/$/,'')).filter(Boolean);
    let added=0;
    raw.forEach(dn=>{
      if(domains.some(d=>d.domain===dn)) return;
      const d = { id:'dom'+(domCounter++), domain:dn, name:prettyName(dn), color:FAVI_COLORS[domCounter%FAVI_COLORS.length], status:'idle' };
      columns.forEach(c=> c.cells[d.id] = {status:'empty'});
      domains.push(d); added++;
    });
    closeModal(); render();
    toast(added?`Добавлено доменов: ${added}`:'Новых доменов нет');
  };
}

  modalPanel.querySelector('#exSheets').onclick = ()=>{ toast('Демо: выгрузка в Google Sheets (макет)'); };

function downloadCsv(){
  const headers = ['site', ...columns.map(c=>c.name), ...columns.map(c=>c.name+' — source_url')];
  const rows = domains.map(d=>{
    const base = [d.domain];
    const vals = columns.map(c=>{ const cell=c.cells[d.id]; return cell?.status==='found'?cell.value:(cell?.status==='notfound'?'❌ Не найдено':''); });
    const srcs = columns.map(c=>{ const cell=c.cells[d.id]; return cell?.sourceUrl||''; });
    return [...base, ...vals, ...srcs];
  });
  const csv = [headers, ...rows].map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download='scout_results.csv'; a.click();
  closeModal(); toast('CSV скачан');
}

/* ============================================================
   TOAST
   ============================================================ */
function toast(msg){
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className='toast';
  el.innerHTML = I.check + '<span>'+escapeHtml(msg)+'</span>';
  wrap.appendChild(el);
  requestAnimationFrame(()=>el.classList.add('show'));
  setTimeout(()=>{ el.classList.remove('show'); setTimeout(()=>el.remove(),300); }, 3200);
}

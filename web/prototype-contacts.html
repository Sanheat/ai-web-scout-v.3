<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Web Scout · Прототип цепочки столбцов «Контакты»</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  /* DESIGN TOKENS — совпадают с web/index.html */
  :root {
    --primary:#0D9488; --primary-600:#0F766E; --primary-700:#115E59; --on-primary:#FFFFFF;
    --secondary:#14B8A6; --accent:#EA580C; --accent-600:#C2410C;
    --bg:#F7F8F9; --surface:#FFFFFF; --surface-2:#FBFCFD; --fg:#0F172A; --fg-soft:#475569;
    --muted:#94A3B8; --muted-bg:#F1F5F9; --border:#E5E8EC; --border-strong:#D3D9DF; --ring:#0D9488;
    --found:#0D9488; --found-bg:#ECFDF8; --notfound:#DC2626; --notfound-bg:#FEF2F2;
    --warn:#B45309; --warn-bg:#FFF7ED; --running:#2563EB; --running-bg:#EFF4FF;
    --radius:10px; --radius-sm:7px;
    --shadow-sm:0 1px 2px rgba(15,23,42,.05); --shadow:0 4px 14px rgba(15,23,42,.08); --shadow-lg:0 12px 40px rgba(15,23,42,.16);
    --row-h:46px; --col-w:270px; --domain-w:280px;
    --mono:'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  html[data-theme="dark"] {
    --bg:#0B1015; --surface:#121922; --surface-2:#0F161E; --fg:#E6EDF3; --fg-soft:#9FB0BE;
    --muted:#6B7E8C; --muted-bg:#1A222C; --border:#232D38; --border-strong:#313D49;
    --found-bg:#0C2722; --notfound-bg:#2A1414; --warn-bg:#2A1E10; --running-bg:#11203A;
    --shadow-sm:0 1px 2px rgba(0,0,0,.4); --shadow:0 4px 14px rgba(0,0,0,.5); --shadow-lg:0 12px 40px rgba(0,0,0,.6);
  }
  * { box-sizing:border-box; }
  html, body { height:100%; }
  body { margin:0; font-family:'Inter',system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--fg); font-size:14px; line-height:1.45; -webkit-font-smoothing:antialiased; overflow:hidden; }
  @media (prefers-reduced-motion: reduce) { * { animation-duration:.001ms !important; transition-duration:.001ms !important; } }
  button { font-family:inherit; cursor:pointer; }
  ::-webkit-scrollbar { height:11px; width:11px; }
  ::-webkit-scrollbar-thumb { background:var(--border-strong); border-radius:8px; border:3px solid transparent; background-clip:content-box; }
  ::-webkit-scrollbar-thumb:hover { background:var(--muted); background-clip:content-box; }
  ::-webkit-scrollbar-track { background:transparent; }

  .app { display:flex; flex-direction:column; height:100vh; }

  /* Top bar */
  .topbar { display:flex; align-items:center; gap:14px; height:56px; padding:0 16px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; z-index:30; }
  .brand { display:flex; align-items:center; gap:10px; font-weight:700; font-size:15px; letter-spacing:-.01em; }
  .brand .logo { width:30px; height:30px; border-radius:8px; background:linear-gradient(135deg,var(--primary),var(--secondary)); display:grid; place-items:center; color:#fff; flex-shrink:0; box-shadow:var(--shadow-sm); }
  .brand .logo svg { width:18px; height:18px; }
  .brand .ver { font-size:11px; font-weight:500; color:var(--muted); border:1px solid var(--border); padding:1px 6px; border-radius:20px; margin-left:2px; }
  .topbar .divider { width:1px; height:26px; background:var(--border); }
  .table-meta { display:flex; align-items:center; gap:8px; min-width:0; }
  .table-meta .name { font-weight:600; font-size:14px; }
  .table-meta .chip { font-size:12px; color:var(--fg-soft); background:var(--muted-bg); padding:2px 9px; border-radius:20px; white-space:nowrap; }
  .table-meta .chip.proto { color:var(--accent); background:rgba(234,88,12,.1); }
  .topbar .spacer { flex:1; }
  .btn { display:inline-flex; align-items:center; gap:7px; height:34px; padding:0 13px; border-radius:var(--radius-sm); border:1px solid var(--border-strong); background:var(--surface); color:var(--fg); font-weight:500; font-size:13px; transition:background .15s,border-color .15s,transform .08s; white-space:nowrap; }
  .btn svg { width:16px; height:16px; }
  .btn:hover { background:var(--muted-bg); border-color:var(--muted); }
  .btn:active { transform:translateY(1px); }
  .btn:focus-visible { outline:2px solid var(--ring); outline-offset:2px; }
  .btn.ghost { border-color:transparent; background:transparent; }
  .btn.ghost:hover { background:var(--muted-bg); }
  .btn.icon { padding:0; width:34px; justify-content:center; }
  .btn.primary { background:var(--primary); color:var(--on-primary); border-color:var(--primary); }
  .btn.primary:hover { background:var(--primary-600); border-color:var(--primary-600); }
  .btn.accent { background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:var(--shadow-sm); }
  .btn.accent:hover { background:var(--accent-600); border-color:var(--accent-600); }
  .avatar { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,#6366F1,#8B5CF6); color:#fff; font-weight:600; font-size:13px; display:grid; place-items:center; }

  /* Sub toolbar */
  .subbar { display:flex; align-items:center; gap:8px; height:46px; padding:0 16px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; z-index:20; }
  .subbar .tab { display:inline-flex; align-items:center; gap:7px; height:30px; padding:0 11px; border-radius:7px; font-size:13px; font-weight:500; color:var(--fg-soft); border:1px solid transparent; background:transparent; }
  .subbar .tab svg { width:15px; height:15px; }
  .subbar .tab.active { background:var(--muted-bg); color:var(--fg); }
  .subbar .spacer { flex:1; }
  .count-pill { font-size:12px; color:var(--fg-soft); display:flex; align-items:center; gap:5px; }
  .count-pill b { color:var(--fg); font-weight:600; }
  .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .dot.ok { background:var(--found); }

  /* Grid */
  .grid-wrap { flex:1; overflow:auto; position:relative; background:var(--bg); }
  .grid { display:grid; width:max-content; min-width:100%; }
  .cell { border-right:1px solid var(--border); border-bottom:1px solid var(--border); background:var(--surface); min-height:var(--row-h); display:flex; align-items:center; position:relative; }
  .hcell { position:sticky; top:0; z-index:12; background:var(--surface-2); border-bottom:1px solid var(--border-strong); min-height:66px; padding:0; }
  .hcell.corner { z-index:16; left:0; }
  .col-domain { position:sticky; left:0; z-index:8; background:var(--surface); box-shadow:1px 0 0 var(--border); }
  .hcell.col-domain { z-index:14; }
  .domain-head { display:flex; align-items:center; gap:9px; padding:0 12px; width:100%; }
  .domain-head .ic { width:16px; height:16px; color:var(--muted); }
  .domain-head .lbl { font-weight:600; font-size:12.5px; letter-spacing:.01em; text-transform:uppercase; color:var(--fg-soft); }
  .domain-head .spacer { flex:1; }
  .badge-count { font-size:12px; color:var(--fg-soft); background:var(--muted-bg); padding:2px 9px; border-radius:20px; }
  .domain-cell { display:flex; align-items:center; gap:10px; padding:0 12px; width:100%; min-width:0; }
  .favicon { width:22px; height:22px; border-radius:6px; flex-shrink:0; display:grid; place-items:center; color:#fff; font-weight:700; font-size:11px; text-transform:uppercase; }
  .domain-cell .meta { min-width:0; display:flex; flex-direction:column; line-height:1.25; }
  .domain-cell .d-name { font-weight:550; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .domain-cell .d-url { font-size:11.5px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .data-head { width:100%; padding:8px 11px; display:flex; flex-direction:column; gap:5px; }
  .data-head .top { display:flex; align-items:center; gap:7px; }
  .data-head .typeic { width:20px; height:20px; border-radius:5px; flex-shrink:0; display:grid; place-items:center; color:#fff; }
  .data-head .typeic svg { width:12px; height:12px; }
  .data-head .cname { font-weight:600; font-size:13px; flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .data-head .menu-btn { width:22px; height:22px; border-radius:5px; border:0; background:transparent; color:var(--muted); display:grid; place-items:center; }
  .data-head .menu-btn:hover { background:var(--muted-bg); color:var(--fg); }
  .data-head .menu-btn svg { width:15px; height:15px; }
  .prompt-line { font-size:11.5px; color:var(--fg-soft); background:var(--muted-bg); border:1px solid transparent; border-radius:6px; padding:4px 8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:flex; align-items:center; gap:6px; }
  .prompt-line .pic { width:12px; height:12px; color:var(--primary); flex-shrink:0; }
  .prompt-line .reft { color:var(--accent); font-weight:600; font-family:var(--mono); font-size:11px; }
  .data-head .foot { display:flex; align-items:center; gap:6px; }
  .modeltag { font-size:10.5px; font-weight:500; color:var(--fg-soft); background:var(--surface); border:1px solid var(--border); padding:1px 7px; border-radius:20px; display:inline-flex; align-items:center; gap:4px; }
  .modeltag .gd { width:6px; height:6px; border-radius:50%; background:var(--secondary); }
  .data-head .runcol { margin-left:auto; height:24px; padding:0 9px; border-radius:6px; border:1px solid var(--primary); color:var(--primary); background:transparent; font-size:11.5px; font-weight:600; display:inline-flex; align-items:center; gap:5px; }
  .data-head .runcol:hover { background:var(--primary); color:#fff; }
  .data-head .runcol svg { width:12px; height:12px; }

  .data-cell { width:100%; padding:0 12px; cursor:pointer; min-width:0; }
  .data-cell:hover { background:var(--surface-2); }
  .data-cell .inner { display:flex; align-items:center; gap:8px; width:100%; padding:7px 0; min-width:0; }
  .cell-val { font-size:13px; min-width:0; overflow:hidden; }
  .cell-val .v { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:500; }
  .cell-empty { color:var(--muted); font-size:12px; }

  /* list-in-cell (люди / почты) */
  .list-cell { display:flex; align-items:center; gap:9px; width:100%; min-width:0; }
  .avastack { display:flex; flex-shrink:0; }
  .avastack .av { width:24px; height:24px; border-radius:50%; display:grid; place-items:center; color:#fff; font-weight:600; font-size:9.5px; border:2px solid var(--surface); margin-left:-7px; }
  .avastack .av:first-child { margin-left:0; }
  .avastack .more { width:24px; height:24px; border-radius:50%; display:grid; place-items:center; font-weight:600; font-size:9.5px; border:2px solid var(--surface); margin-left:-7px; background:var(--muted-bg); color:var(--fg-soft); }
  .list-meta { min-width:0; display:flex; flex-direction:column; line-height:1.3; }
  .list-meta .lm-n { font-weight:600; font-size:13px; }
  .list-meta .lm-s { font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .list-cell .lc-arrow { margin-left:auto; color:var(--muted); flex-shrink:0; }
  .list-cell .lc-arrow svg { width:16px; height:16px; }
  .type-mail .av-ic { width:26px; height:26px; border-radius:7px; flex-shrink:0; display:grid; place-items:center; color:#fff; background:linear-gradient(135deg,#0891B2,#2563EB); }
  .type-mail .av-ic svg { width:15px; height:15px; }

  .badge { display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:600; padding:2px 8px; border-radius:20px; flex-shrink:0; }
  .badge svg { width:12px; height:12px; }
  .badge.found { color:var(--found); background:var(--found-bg); }
  .badge.warn { color:var(--warn); background:var(--warn-bg); }
  .badge.queued { color:var(--muted); background:var(--muted-bg); }

  .addcol-head { position:sticky; top:0; z-index:11; background:var(--surface-2); border-bottom:1px solid var(--border-strong); border-right:1px solid var(--border); min-width:150px; width:150px; display:flex; align-items:center; justify-content:center; }
  .addcol-head button { display:inline-flex; align-items:center; gap:6px; height:32px; padding:0 12px; border-radius:7px; border:1px dashed var(--border-strong); background:transparent; color:var(--fg-soft); font-size:12.5px; font-weight:500; }
  .addcol-head button:hover { border-color:var(--primary); color:var(--primary); background:var(--found-bg); }
  .addcol-head button svg { width:15px; height:15px; }
  .addcol-body { border-right:1px solid var(--border); border-bottom:1px solid var(--border); background:var(--surface); }

  /* taxonomy chips */
  .tagchip { display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:500; padding:2px 9px; border-radius:6px; background:var(--muted-bg); color:var(--fg-soft); white-space:nowrap; }
  .tagchip .td-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .lvlchip { display:inline-flex; align-items:center; font-size:11px; font-weight:600; padding:2px 8px; border-radius:20px; white-space:nowrap; }
  .lvlchip.l0 { color:#7C2D12; background:#FFEDD5; } .lvlchip.l1 { color:#5B21B6; background:#EDE9FE; }
  .lvlchip.l2 { color:#1E40AF; background:#DBEAFE; } .lvlchip.l3 { color:var(--fg-soft); background:var(--muted-bg); }
  html[data-theme="dark"] .lvlchip.l0 { color:#FDBA74; background:#3A1E0C; }
  html[data-theme="dark"] .lvlchip.l1 { color:#C4B5FD; background:#241944; }
  html[data-theme="dark"] .lvlchip.l2 { color:#93C5FD; background:#132347; }

  /* Drawer */
  .scrim { position:fixed; inset:0; background:rgba(15,23,42,.5); opacity:0; pointer-events:none; transition:opacity .25s; z-index:50; }
  .scrim.show { opacity:1; pointer-events:auto; }
  .drawer { position:fixed; top:0; right:0; height:100vh; width:460px; max-width:94vw; background:var(--surface); border-left:1px solid var(--border); box-shadow:var(--shadow-lg); z-index:60; transform:translateX(100%); transition:transform .28s cubic-bezier(.4,0,.2,1); display:flex; flex-direction:column; }
  .drawer.show { transform:translateX(0); }
  .drawer .dh { display:flex; align-items:center; gap:10px; padding:16px 18px; border-bottom:1px solid var(--border); }
  .drawer .dh .favicon { width:30px; height:30px; border-radius:8px; }
  .drawer .dh .t { font-weight:600; font-size:14px; }
  .drawer .dh .s { font-size:12px; color:var(--muted); display:flex; align-items:center; gap:6px; }
  .drawer .dh .s .reft { color:var(--accent); font-weight:600; font-family:var(--mono); font-size:11px; }
  .drawer .dh .x { margin-left:auto; width:30px; height:30px; border-radius:7px; border:0; background:var(--muted-bg); color:var(--fg-soft); display:grid; place-items:center; }
  .drawer .dh .x:hover { background:var(--border); }
  .drawer .db { padding:16px 18px; overflow-y:auto; flex:1; }
  .dsub { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); margin-bottom:12px; }
  .dsub > svg { width:15px; height:15px; flex-shrink:0; }
  .dsub .dpill { background:var(--muted-bg); color:var(--fg-soft); padding:2px 9px; border-radius:20px; font-weight:600; }

  .person-card { border:1px solid var(--border); border-radius:11px; padding:12px 13px; margin-bottom:10px; background:var(--surface); }
  .pc-top { display:flex; align-items:flex-start; gap:11px; }
  .pc-ava { width:38px; height:38px; border-radius:50%; flex-shrink:0; display:grid; place-items:center; color:#fff; font-weight:600; font-size:14px; }
  .pc-main { flex:1; min-width:0; }
  .pc-name { font-weight:600; font-size:14px; }
  .pc-title { font-size:12px; color:var(--fg-soft); margin-top:1px; }
  .pc-tags { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
  .pc-src { font-size:11px; color:var(--muted); display:inline-flex; align-items:center; gap:5px; margin-top:9px; }
  .pc-src > svg { width:12px; height:12px; }
  .pc-src a { color:var(--primary); text-decoration:none; }
  .pc-emails { margin-top:10px; padding-top:10px; border-top:1px dashed var(--border); display:flex; flex-direction:column; gap:7px; }
  .email-row { display:flex; align-items:center; gap:8px; }
  .email-row > svg { width:15px; height:15px; color:var(--muted); flex-shrink:0; }
  .email-row .em { font-family:var(--mono); font-size:12px; color:var(--primary-700); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .email-row .kind { font-size:10px; color:var(--muted); background:var(--muted-bg); padding:1px 6px; border-radius:5px; }

  /* Modal */
  .modal { position:fixed; inset:0; z-index:70; display:grid; place-items:center; padding:20px; background:rgba(15,23,42,.5); opacity:0; pointer-events:none; transition:opacity .2s; }
  .modal.show { opacity:1; pointer-events:auto; }
  .modal .panel { background:var(--surface); border-radius:14px; box-shadow:var(--shadow-lg); width:560px; max-width:100%; max-height:92vh; overflow:hidden; display:flex; flex-direction:column; transform:scale(.96) translateY(8px); transition:transform .2s; border:1px solid var(--border); }
  .modal.show .panel { transform:scale(1) translateY(0); }
  .modal .mh { display:flex; align-items:center; gap:10px; padding:18px 20px 14px; border-bottom:1px solid var(--border); }
  .modal .mh .mic { width:32px; height:32px; border-radius:8px; background:var(--found-bg); color:var(--primary); display:grid; place-items:center; }
  .modal .mh .mic svg { width:18px; height:18px; }
  .modal .mh .t { font-weight:600; font-size:15px; }
  .modal .mh .s { font-size:12.5px; color:var(--muted); }
  .modal .mh .x { margin-left:auto; width:30px; height:30px; border-radius:7px; border:0; background:transparent; color:var(--muted); display:grid; place-items:center; }
  .modal .mh .x:hover { background:var(--muted-bg); color:var(--fg); }
  .modal .mb { padding:18px 20px; overflow-y:auto; }
  .modal .mf { padding:14px 20px; border-top:1px solid var(--border); display:flex; gap:10px; justify-content:flex-end; background:var(--surface-2); align-items:center; }
  .modal .mf .mf-note { margin-right:auto; font-size:12px; color:var(--muted); display:flex; align-items:center; gap:6px; }
  .modal .mf .mf-note svg { width:14px; height:14px; }

  .field { margin-bottom:16px; }
  .field label { display:block; font-size:12.5px; font-weight:600; margin-bottom:6px; }
  .field .hint { font-size:12px; color:var(--muted); margin-top:6px; line-height:1.45; }
  .field input[type=text], .field textarea, .field select { width:100%; border:1px solid var(--border-strong); border-radius:8px; padding:9px 11px; font-size:13.5px; font-family:inherit; color:var(--fg); background:var(--surface); outline:none; transition:border-color .15s,box-shadow .15s; resize:vertical; }
  .field textarea { min-height:74px; line-height:1.5; }
  .field textarea.mono { font-family:var(--mono); font-size:12.5px; }
  .field input:focus, .field textarea:focus, .field select:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(13,148,136,.15); }

  .type-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .type-opt { border:1px solid var(--border-strong); border-radius:10px; padding:12px; cursor:pointer; transition:border-color .15s,background .15s; }
  .type-opt:hover { border-color:var(--muted); background:var(--surface-2); }
  .type-opt.sel { border-color:var(--primary); background:var(--found-bg); box-shadow:0 0 0 1px var(--primary); }
  .type-opt .ti { width:28px; height:28px; border-radius:7px; display:grid; place-items:center; color:#fff; margin-bottom:8px; }
  .type-opt .ti svg { width:16px; height:16px; }
  .type-opt .tt { font-weight:600; font-size:13px; }
  .type-opt .td { font-size:11.5px; color:var(--muted); margin-top:2px; line-height:1.4; }

  /* reference chips (ссылки на столбцы) */
  .ref-chips { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; align-items:center; }
  .ref-chips .rl { font-size:11px; color:var(--muted); margin-right:2px; }
  .ref-chip { font-size:11.5px; font-family:var(--mono); border-radius:6px; padding:3px 8px; border:1px solid; }
  .ref-chip.col { color:var(--accent); background:rgba(234,88,12,.08); border-color:rgba(234,88,12,.28); }
  .ref-chip.dom { color:var(--primary-700); background:var(--found-bg); border-color:var(--primary); }

  .src-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .src-opt { display:flex; align-items:center; gap:9px; padding:9px 11px; border:1px solid var(--border-strong); border-radius:9px; cursor:pointer; transition:all .13s; user-select:none; }
  .src-opt:hover { border-color:var(--muted); }
  .src-opt.on { border-color:var(--primary); background:var(--found-bg); }
  .src-opt .so-check { width:18px; height:18px; border-radius:5px; border:1.5px solid var(--border-strong); display:grid; place-items:center; flex-shrink:0; color:#fff; }

/* ТИПЫ (функции) столбца */
const COL_TYPES = {

  formula:{label:'Формула',      icon:I.code,    color:'linear-gradient(135deg,#475569,#64748B)',desc:'Вычисление на основе других столбцов'},
};

/* MOCK DATA */
const FAVI = ["#0D9488","#6366F1","#EA580C","#DB2777","#0891B2","#7C3AED"];
function P(name,title,department,level,emails){ return {name,title,department,level,source:emails.__src||'setka',emails:emails.list}; }
function E(list,src){ list.__src=src; return list; }
const domains = [

/* HELPERS */
function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function initials(n){ return n.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase(); }
function plural(n,f){ const a=n%10,b=n%100; return (a===1&&b!==11)?f[0]:(a>=2&&a<=4&&(b<10||b>=20))?f[1]:f[2]; }
const PPL=['человек','человека','человек'];
function firstName(n){ return n.split(' ')[0]; }
function emailsOf(p){ return p.emails||[]; }
function domainStats(d){ const em=d.people.reduce((a,p)=>a+emailsOf(p).length,0); const tr=d.people.reduce((a,p)=>a+emailsOf(p).filter(e=>e.val==='trusted').length,0); return {ppl:d.people.length,em,tr}; }
function toast(msg){ const el=document.createElement('div'); el.className='toast'; el.innerHTML=I.check+'<span>'+escapeHtml(msg)+'</span>'; document.getElementById('toastWrap').appendChild(el); requestAnimationFrame(()=>el.classList.add('show')); setTimeout(()=>{el.classList.remove('show'); setTimeout(()=>el.remove(),300);},3200); }
function highlightRefs(text){ return escapeHtml(text).replace(/\{\{([^}]+)\}\}/g,'<span class="reft">{{$1}}</span>'); }

    h+=`<div class="cell hcell"><div class="data-head">
      <div class="top"><span class="typeic" style="background:${t.color}">${t.icon}</span><span class="cname">${escapeHtml(col.name)}</span><button class="menu-btn">${I.dots}</button></div>

      <div class="foot"><span class="modeltag"><span class="gd"></span>${escapeHtml(col.model)}</span><button class="runcol">${I.play}<span>Обновить</span></button></div>
    </div></div>`;
  });
  h+=`<div class="cell addcol-head"><button data-act="addcol">${I.plus} Столбец</button></div>`;
  domains.forEach(d=>{
    h+=`<div class="cell col-domain"><div class="domain-cell"><span class="favicon" style="background:${d.color}">${d.name[0]}</span><span class="meta"><span class="d-name">${escapeHtml(d.name)}</span><span class="d-url">${escapeHtml(d.domain)}</span></span></div></div>`;
    columns.forEach(col=>{ h+=renderCell(col,d); });
    h+=`<div class="cell addcol-body"></div>`;
  });
  grid.innerHTML=h;
  updateCounts();
}
function renderCell(col,d){
  if(col.type==='ai'){
    return `<div class="cell data-cell"><div class="inner"><div class="cell-val"><div class="v">${escapeHtml(d.company)}</div></div></div></div>`;
  }
  if(col.type==='people'){
    const st=domainStats(d);
    const avs=d.people.slice(0,3).map(p=>`<span class="av" style="background:${dep(p.department).color}">${initials(p.name)}</span>`).join('');
    const more=d.people.length>3?`<span class="more">+${d.people.length-3}</span>`:'';
    const names=d.people.slice(0,2).map(p=>firstName(p.name)).join(', ')+(d.people.length>2?` и ещё ${d.people.length-2}`:'');
    return `<div class="cell data-cell" data-act="people" data-dom="${d.id}"><div class="inner"><div class="list-cell">
      <span class="avastack">${avs}${more}</span>
      <span class="list-meta"><span class="lm-n">${st.ppl} ${plural(st.ppl,PPL)}</span><span class="lm-s">${escapeHtml(names)}</span></span>
      <span class="lc-arrow">${I.chevron}</span>
    </div></div></div>`;
  }
  if(col.type==='email'){
    const st=domainStats(d);
    return `<div class="cell data-cell type-mail" data-act="email" data-dom="${d.id}"><div class="inner"><div class="list-cell">
      <span class="av-ic">${I.at}</span>
      <span class="list-meta"><span class="lm-n">${st.em} email</span><span class="lm-s">${st.tr} надёжных · ${st.em-st.tr} на проверке</span></span>
      <span class="lc-arrow">${I.chevron}</span>
    </div></div></div>`;
  }
  return `<div class="cell data-cell"><div class="inner"><span class="cell-empty">—</span></div></div>`;
}
function updateCounts(){
  const ppl=domains.reduce((a,d)=>a+d.people.length,0);
  const em=domains.reduce((a,d)=>a+domainStats(d).em,0);
  document.getElementById('cntDomains').textContent=domains.length;
  document.getElementById('cntPeople').textContent=ppl;
  document.getElementById('cntEmails').textContent=em;
}

/* DRAWER */
const drawer=document.getElementById('drawer'), scrim=document.getElementById('scrim');
function openPeopleDrawer(domId){
  const d=domains.find(x=>x.id===domId); if(!d) return;
  const cards=d.people.map(p=>{
    const dp=dep(p.department), l=lvl(p.level);
    return `<div class="person-card"><div class="pc-top">
      <span class="pc-ava" style="background:${dp.color}">${initials(p.name)}</span>
      <div class="pc-main"><div class="pc-name">${escapeHtml(p.name)}</div><div class="pc-title">${escapeHtml(p.title)}</div>
        <div class="pc-tags"><span class="tagchip"><span class="td-dot" style="background:${dp.color}"></span>${dp.label}</span><span class="lvlchip ${l.cls}">${l.label}</span></div>
        <div class="pc-src">${I.link} Источник: <a href="#">${srcLabel(p.source)}</a></div>
      </div></div></div>`;
  }).join('');
  drawer.innerHTML=`
    <div class="dh"><span class="favicon" style="background:${d.color};width:30px;height:30px;border-radius:8px">${d.name[0]}</span>
      <div><div class="t">${escapeHtml(d.name)}</div><div class="s">Столбец <span class="reft">Поиск людей</span></div></div>
      <button class="x" id="dClose">${I.x}</button></div>
    <div class="db"><div class="dsub">${I.users}<span class="dpill">${d.people.length} ${plural(d.people.length,PPL)} найдено</span></div>${cards}</div>`;
  document.getElementById('dClose').onclick=closeDrawer;
  drawer.classList.add('show'); scrim.classList.add('show');
}
function openEmailDrawer(domId){
  const d=domains.find(x=>x.id===domId); if(!d) return;
  const cards=d.people.map(p=>{
    const dp=dep(p.department);
    const emails=emailsOf(p);
    const rows = emails.length ? emails.map(e=>{
      const v=VALS[e.val];
      return `<div class="email-row">${I.mail}<span class="em">${escapeHtml(e.addr)}</span><span class="kind">${e.kind}</span><span class="badge ${v.badge}">${v.icon}${v.label}</span></div>`;
    }).join('') : `<div class="email-row" style="color:var(--muted)">${I.mail}<span class="em" style="color:var(--muted)">почта не найдена</span></div>`;
    return `<div class="person-card"><div class="pc-top">
      <span class="pc-ava" style="background:${dp.color}">${initials(p.name)}</span>
      <div class="pc-main"><div class="pc-name">${escapeHtml(p.name)}</div><div class="pc-title">${escapeHtml(p.title)}</div></div></div>
      <div class="pc-emails">${rows}</div></div>`;
  }).join('');
  const st=domainStats(d);
  drawer.innerHTML=`
    <div class="dh"><span class="favicon" style="background:${d.color};width:30px;height:30px;border-radius:8px">${d.name[0]}</span>
      <div><div class="t">${escapeHtml(d.name)}</div><div class="s">Столбец <span class="reft">Поиск почт</span> · из <span class="reft">Поиск людей</span></div></div>
      <button class="x" id="dClose">${I.x}</button></div>
    <div class="db"><div class="dsub">${I.at}<span class="dpill">${st.em} email</span><span class="dpill">${st.tr} надёжных</span></div>${cards}</div>`;
  document.getElementById('dClose').onclick=closeDrawer;
  drawer.classList.add('show'); scrim.classList.add('show');
}
function closeDrawer(){ drawer.classList.remove('show'); scrim.classList.remove('show'); }
scrim.onclick=closeDrawer;

/* MODAL */
const modalRoot=document.getElementById('modalRoot'), modalPanel=document.getElementById('modalPanel');
function openModal(html){ modalPanel.innerHTML=html; modalRoot.classList.add('show'); }
function closeModal(){ modalRoot.classList.remove('show'); }
modalRoot.addEventListener('click',e=>{ if(e.target===modalRoot) closeModal(); });

let ncType='people';
let ncSources=new Set(['site','setka','tenchat','hh','linkedin']);
let ncVerify=true;
const NC_DEFAULT={
  ai:{name:'Новый столбец',prompt:'Что извлечь с сайта {{Website}}?'},
  people:{name:'Поиск людей',prompt:'Найди людей компании {{Название компании}} на выбранных площадках'},
  email:{name:'Поиск почт',prompt:'Подбери и проверь почты для {{Поиск людей}} на домене {{Website}}'},
  formula:{name:'Формула',prompt:'IF({{Поиск почт}}; "есть"; "нет")'},
};
function openAddColumn(){
  ncType='people'; ncSources=new Set(['site','setka','tenchat','hh','linkedin']); ncVerify=true;
  const typeCards=Object.entries(COL_TYPES).map(([k,v])=>`
    <div class="type-opt ${k===ncType?'sel':''}" data-type="${k}"><div class="ti" style="background:${v.color}">${v.icon}</div><div class="tt">${v.label}</div><div class="td">${v.desc}</div></div>`).join('');
  openModal(`
    <div class="mh"><span class="mic">${I.users}</span><div><div class="t">Новый столбец</div><div class="s">Столбцы могут ссылаться друг на друга через {{…}}</div></div><button class="x" data-close>${I.x}</button></div>
    <div class="mb">
      <div class="field"><label>Тип столбца</label><div class="type-grid">${typeCards}</div></div>
      <div class="field"><label for="ncName">Название столбца</label><input type="text" id="ncName" value="${NC_DEFAULT[ncType].name}" /></div>
      <div id="ncBody"></div>
    </div>
    <div class="mf"><div class="mf-note">${I.sparkles}<span id="ncSummary"></span></div><button class="btn ghost" data-close>Отмена</button><button class="btn primary" id="ncCreate">${I.play} Создать и запустить</button></div>`);
  renderNcBody();
  modalPanel.querySelectorAll('.type-opt').forEach(el=>el.onclick=()=>{
    ncType=el.dataset.type;
    modalPanel.querySelectorAll('.type-opt').forEach(x=>x.classList.toggle('sel',x===el));
    document.getElementById('ncName').value=NC_DEFAULT[ncType].name;
    renderNcBody();
  });
  document.getElementById('ncCreate').onclick=()=>{ closeModal();
    if(ncType==='people') toast('Столбец «Поиск людей» создан · поиск по '+ncSources.size+' площадкам запущен');
    else if(ncType==='email') toast('Столбец «Поиск почт» создан · подбор и валидация запущены');
    else toast('Столбец создан'); };
  modalPanel.querySelectorAll('[data-close]').forEach(b=>b.onclick=closeModal);
}
function refChipsHtml(){
  // ссылки на существующие столбцы + переменные домена
  const cols=columns.map(c=>`<button class="ref-chip col" data-ins="{{${c.name}}}">{{${escapeHtml(c.name)}}}</button>`).join('');
  return `<div class="ref-chips"><span class="rl">Вставить ссылку:</span>${cols}<button class="ref-chip dom" data-ins="{{Website}}">{{Website}}</button></div>`;
}
function renderNcBody(){
  const body=document.getElementById('ncBody');
  const promptField=(labelTxt)=>`<div class="field"><label for="ncPrompt">${labelTxt}</label><textarea id="ncPrompt" class="mono">${NC_DEFAULT[ncType].prompt}</textarea>${refChipsHtml()}</div>`;
  if(ncType==='ai'||ncType==='formula'){
    body.innerHTML=promptField(ncType==='ai'?'Промпт — что искать на каждом сайте':'Формула / условие');
  } else if(ncType==='people'){
    const srcOpts=SOURCES.map(s=>`<div class="src-opt ${ncSources.has(s.id)?'on':''}" data-src="${s.id}"><span class="so-check">${I.check}</span><span class="so-ic">${s.ic}</span><span class="so-lbl">${s.label}</span></div>`).join('');
    body.innerHTML=`
      ${promptField('Промпт — кого искать (со ссылкой на столбец компании)')}
      <div class="field"><label>Где искать людей и упоминания</label><div class="src-grid">${srcOpts}</div>
        <div class="hint">Веб-поиск по выбранным площадкам + LLM-разбор выдачи.</div></div>
      <div class="field"><div class="extract-note">${I.sparkles}<div>На выходе для каждого человека извлекаются <b>имя, должность и направление</b> (нормализованное: Руководство, Маркетинг, Продажи…). Несколько человек показываются списком в ячейке.</div></div></div>`;
    body.querySelectorAll('.src-opt').forEach(el=>el.onclick=()=>{ const id=el.dataset.src; ncSources.has(id)?ncSources.delete(id):ncSources.add(id); el.classList.toggle('on'); updateNcSummary(); });
  } else if(ncType==='email'){
    body.innerHTML=`
      ${promptField('Для кого искать почты (ссылка на столбец с людьми) + домен')}
      <div class="field"><div class="toggle-row"><span class="so-ic">${I.shieldCheck}</span>
        <div class="tr-txt"><div class="tr-t">Проверять корпоративные email</div><div class="tr-s">Подбор по имени+домену и MX/SMTP-проверка → бейдж «Надёжный / Рискованный»</div></div>
        <button class="switch ${ncVerify?'on':''}" id="ncVerify" aria-label="Проверять email"></button></div></div>
      <div class="field"><div class="extract-note">${I.at}<div>Ищет <b>личные и корпоративные</b> почты для каждого человека из <b>{{Поиск людей}}</b>. Результат — список почт с бейджем валидации в ячейке.</div></div></div>`;
    body.querySelector('#ncVerify').onclick=e=>{ ncVerify=!ncVerify; e.currentTarget.classList.toggle('on',ncVerify); updateNcSummary(); };
  }
  // ref chip insert
  body.querySelectorAll('[data-ins]').forEach(b=>b.onclick=()=>{ const ta=body.querySelector('#ncPrompt'); if(ta){ ta.value+=(ta.value&&!ta.value.endsWith(' ')?' ':'')+b.dataset.ins; ta.focus(); } });
  updateNcSummary();
}
function updateNcSummary(){
  const el=document.getElementById('ncSummary'); if(!el) return;
  if(ncType==='people') el.textContent=`${ncSources.size} площадок · извлечение должности/направления`;
  else if(ncType==='email') el.textContent=ncVerify?'подбор + валидация почт':'подбор почт без валидации';
  else el.textContent='классический столбец';
}

/* EVENTS */
document.getElementById('themeBtn').onclick=()=>{ const el=document.documentElement; el.dataset.theme=el.dataset.theme==='dark'?'':'dark'; };
document.getElementById('addColBtn').onclick=openAddColumn;
document.getElementById('runAllBtn').onclick=()=>toast('Пайплайн запущен для всех столбцов');
document.getElementById('exportBtn').onclick=()=>toast('Экспорт в CSV (списки развёрнуты по строкам)');
grid.addEventListener('click',e=>{ const c=e.target.closest('[data-act]'); if(!c) return;
  const a=c.dataset.act;
  if(a==='people') openPeopleDrawer(c.dataset.dom);
  else if(a==='email') openEmailDrawer(c.dataset.dom);
  else if(a==='addcol') openAddColumn();
});

/* INIT + deep-link (#new / #people / #emails) */
render();
(function(){ const h=(location.hash||'').replace('#',''); if(h==='new') openAddColumn(); else if(h==='people') openPeopleDrawer('d4'); else if(h==='emails') openEmailDrawer('d1'); })();
</script>
</body>
</html>

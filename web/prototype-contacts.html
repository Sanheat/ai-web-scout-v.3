<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Web Scout · Прототип «Контакты»</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     DESIGN TOKENS  (совпадают с web/index.html)
     ============================================================ */
  :root {
    --primary:#0D9488; --primary-600:#0F766E; --primary-700:#115E59; --on-primary:#FFFFFF;
    --secondary:#14B8A6; --accent:#EA580C; --accent-600:#C2410C;
    --bg:#F7F8F9; --surface:#FFFFFF; --surface-2:#FBFCFD; --fg:#0F172A; --fg-soft:#475569;
    --muted:#94A3B8; --muted-bg:#F1F5F9; --border:#E5E8EC; --border-strong:#D3D9DF; --ring:#0D9488;
    --found:#0D9488; --found-bg:#ECFDF8; --notfound:#DC2626; --notfound-bg:#FEF2F2;
    --warn:#B45309; --warn-bg:#FFF7ED; --pending:#94A3B8; --running:#2563EB; --running-bg:#EFF4FF;
    --radius:10px; --radius-sm:7px;
    --shadow-sm:0 1px 2px rgba(15,23,42,.05); --shadow:0 4px 14px rgba(15,23,42,.08); --shadow-lg:0 12px 40px rgba(15,23,42,.16);
    --row-h:46px; --col-w:260px; --domain-w:300px;
    --mono:'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  html[data-theme="dark"] {
    --bg:#0B1015; --surface:#121922; --surface-2:#0F161E; --fg:#E6EDF3; --fg-soft:#9FB0BE;
    --muted:#6B7E8C; --muted-bg:#1A222C; --border:#232D38; --border-strong:#313D49;
    --found-bg:#0C2722; --notfound-bg:#2A1414; --warn-bg:#2A1E10; --running-bg:#11203A;
    --shadow-sm:0 1px 2px rgba(0,0,0,.4); --shadow:0 4px 14px rgba(0,0,0,.5); --shadow-lg:0 12px 40px rgba(0,0,0,.6);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body { margin:0; font-family:'Inter',system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--fg); font-size:14px; line-height:1.45; -webkit-font-smoothing:antialiased; overflow:hidden; }
  @media (prefers-reduced-motion: reduce) { * { animation-duration:.001ms !important; transition-duration:.001ms !important; } }
  button { font-family: inherit; cursor: pointer; }
  ::-webkit-scrollbar { height:11px; width:11px; }
  ::-webkit-scrollbar-thumb { background:var(--border-strong); border-radius:8px; border:3px solid transparent; background-clip:content-box; }
  ::-webkit-scrollbar-thumb:hover { background:var(--muted); background-clip:content-box; }
  ::-webkit-scrollbar-track { background:transparent; }

  .app { display:flex; flex-direction:column; height:100vh; }

  /* ---- Top bar ---- */
  .topbar { display:flex; align-items:center; gap:14px; height:56px; padding:0 16px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; z-index:30; }
  .brand { display:flex; align-items:center; gap:10px; font-weight:700; font-size:15px; letter-spacing:-.01em; }
  .brand .logo { width:30px; height:30px; border-radius:8px; background:linear-gradient(135deg,var(--primary),var(--secondary)); display:grid; place-items:center; color:#fff; flex-shrink:0; box-shadow:var(--shadow-sm); }
  .brand .logo svg { width:18px; height:18px; }
  .brand .ver { font-size:11px; font-weight:500; color:var(--muted); border:1px solid var(--border); padding:1px 6px; border-radius:20px; margin-left:2px; }
  .topbar .divider { width:1px; height:26px; background:var(--border); }
  .table-meta { display:flex; align-items:center; gap:8px; min-width:0; }
  .table-meta .name { font-weight:600; font-size:14px; }
  .table-meta .chip { font-size:12px; color:var(--fg-soft); background:var(--muted-bg); padding:2px 9px; border-radius:20px; white-space:nowrap; }
  .table-meta .chip.proto { color:var(--accent); background:rgba(234,88,12,.1); }
  .topbar .spacer { flex:1; }

  .btn { display:inline-flex; align-items:center; gap:7px; height:34px; padding:0 13px; border-radius:var(--radius-sm); border:1px solid var(--border-strong); background:var(--surface); color:var(--fg); font-weight:500; font-size:13px; transition:background .15s,border-color .15s,transform .08s,box-shadow .15s; white-space:nowrap; }
  .btn svg { width:16px; height:16px; }
  .btn:hover { background:var(--muted-bg); border-color:var(--muted); }
  .btn:active { transform:translateY(1px); }
  .btn:focus-visible { outline:2px solid var(--ring); outline-offset:2px; }
  .btn.ghost { border-color:transparent; background:transparent; }
  .btn.ghost:hover { background:var(--muted-bg); }
  .btn.icon { padding:0; width:34px; justify-content:center; }
  .btn.primary { background:var(--primary); color:var(--on-primary); border-color:var(--primary); }
  .btn.primary:hover { background:var(--primary-600); border-color:var(--primary-600); }
  .btn.accent { background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:var(--shadow-sm); }
  .btn.accent:hover { background:var(--accent-600); border-color:var(--accent-600); }
  .btn[disabled] { opacity:.5; pointer-events:none; }
  .avatar { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,#6366F1,#8B5CF6); color:#fff; font-weight:600; font-size:13px; display:grid; place-items:center; }

  /* ---- Sub toolbar ---- */
  .subbar { display:flex; align-items:center; gap:8px; height:46px; padding:0 16px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; z-index:20; }
  .subbar .tab { display:inline-flex; align-items:center; gap:7px; height:30px; padding:0 11px; border-radius:7px; font-size:13px; font-weight:500; color:var(--fg-soft); border:1px solid transparent; background:transparent; }
  .subbar .tab svg { width:15px; height:15px; }
  .subbar .tab.active { background:var(--muted-bg); color:var(--fg); }
  .subbar .tab:hover:not(.active) { background:var(--muted-bg); }
  .subbar .spacer { flex:1; }
  .count-pill { font-size:12px; color:var(--fg-soft); display:flex; align-items:center; gap:5px; }
  .count-pill b { color:var(--fg); font-weight:600; }
  .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .dot.ok { background:var(--found); } .dot.idle { background:var(--muted); } .dot.run { background:var(--running); animation:pulse 1.1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }

  /* ============================================================
     VIEWS
     ============================================================ */
  .view { flex:1; overflow:auto; position:relative; background:var(--bg); }
  .view.hidden { display:none; }

  /* ---- Grid (Clay-like) ---- */
  .grid { display:grid; width:max-content; min-width:100%; }
  .cell { border-right:1px solid var(--border); border-bottom:1px solid var(--border); background:var(--surface); min-height:var(--row-h); display:flex; align-items:center; position:relative; }
  .hcell { position:sticky; top:0; z-index:12; background:var(--surface-2); border-bottom:1px solid var(--border-strong); min-height:64px; padding:0; }
  .hcell.corner { z-index:16; left:0; }
  .col-domain { position:sticky; left:0; z-index:8; background:var(--surface); box-shadow:1px 0 0 var(--border); }
  .hcell.col-domain { z-index:14; }
  .domain-head { display:flex; align-items:center; gap:9px; padding:0 12px; width:100%; }
  .domain-head .ic { width:16px; height:16px; color:var(--muted); }
  .domain-head .lbl { font-weight:600; font-size:12.5px; letter-spacing:.01em; text-transform:uppercase; color:var(--fg-soft); }
  .domain-head .spacer { flex:1; }
  .badge-count { font-size:12px; color:var(--fg-soft); background:var(--muted-bg); padding:2px 9px; border-radius:20px; }
  .domain-cell { display:flex; align-items:center; gap:10px; padding:0 12px; width:100%; min-width:0; }
  .favicon { width:22px; height:22px; border-radius:6px; flex-shrink:0; display:grid; place-items:center; color:#fff; font-weight:700; font-size:11px; text-transform:uppercase; }
  .domain-cell .meta { min-width:0; display:flex; flex-direction:column; line-height:1.25; }
  .domain-cell .d-name { font-weight:550; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .domain-cell .d-url { font-size:11.5px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .domain-cell .d-status { margin-left:auto; flex-shrink:0; }

  .data-head { width:100%; padding:8px 11px 8px; display:flex; flex-direction:column; gap:5px; }
  .data-head .top { display:flex; align-items:center; gap:7px; }
  .data-head .typeic { width:20px; height:20px; border-radius:5px; flex-shrink:0; display:grid; place-items:center; color:#fff; }
  .data-head .typeic svg { width:12px; height:12px; }
  .data-head .cname { font-weight:600; font-size:13px; flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .data-head .menu-btn { width:22px; height:22px; border-radius:5px; border:0; background:transparent; color:var(--muted); display:grid; place-items:center; }
  .data-head .menu-btn:hover { background:var(--muted-bg); color:var(--fg); }
  .data-head .menu-btn svg { width:15px; height:15px; }
  .prompt-line { font-size:11.5px; color:var(--fg-soft); background:var(--muted-bg); border:1px solid transparent; border-radius:6px; padding:4px 8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:flex; align-items:center; gap:6px; }
  .prompt-line .pic { width:12px; height:12px; color:var(--primary); flex-shrink:0; }
  .data-head .foot { display:flex; align-items:center; gap:6px; }
  .modeltag { font-size:10.5px; font-weight:500; color:var(--fg-soft); background:var(--surface); border:1px solid var(--border); padding:1px 7px; border-radius:20px; display:inline-flex; align-items:center; gap:4px; }
  .modeltag .gd { width:6px; height:6px; border-radius:50%; background:var(--secondary); }
  .data-head .runcol { margin-left:auto; height:24px; padding:0 9px; border-radius:6px; border:1px solid var(--primary); color:var(--primary); background:transparent; font-size:11.5px; font-weight:600; display:inline-flex; align-items:center; gap:5px; }
  .data-head .runcol:hover { background:var(--primary); color:#fff; }
  .data-head .runcol svg { width:12px; height:12px; }

  .data-cell { width:100%; padding:0 12px; cursor:pointer; min-width:0; }
  .data-cell:hover { background:var(--surface-2); }
  .data-cell .inner { display:flex; align-items:center; gap:8px; width:100%; padding:7px 0; min-width:0; }
  .cell-val { font-size:13px; min-width:0; overflow:hidden; }
  .cell-val .v { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .cell-val .src { font-size:11px; color:var(--muted); display:flex; align-items:center; gap:4px; margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .cell-val .src svg { width:11px; height:11px; flex-shrink:0; }
  .cell-empty { color:var(--muted); font-size:12px; }

  /* contacts cell summary */
  .contacts-sum { display:flex; align-items:center; gap:8px; width:100%; }
  .contacts-sum .cs-ic { width:26px; height:26px; border-radius:7px; flex-shrink:0; display:grid; place-items:center; color:#fff; background:linear-gradient(135deg,#0891B2,#2563EB); }
  .contacts-sum .cs-ic svg { width:15px; height:15px; }
  .contacts-sum .cs-meta { min-width:0; line-height:1.3; display:flex; flex-direction:column; }
  .contacts-sum .cs-n { font-weight:600; font-size:13px; }
  .contacts-sum .cs-sub { font-size:11px; color:var(--muted); }
  .contacts-sum .cs-arrow { margin-left:auto; color:var(--muted); flex-shrink:0; }
  .contacts-sum .cs-arrow svg { width:16px; height:16px; }

  .badge { display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:600; padding:2px 8px; border-radius:20px; flex-shrink:0; }
  .badge svg { width:12px; height:12px; }
  .badge.found { color:var(--found); background:var(--found-bg); }
  .badge.notfound { color:var(--notfound); background:var(--notfound-bg); }
  .badge.warn { color:var(--warn); background:var(--warn-bg); }
  .badge.running { color:var(--running); background:var(--running-bg); }
  .badge.queued { color:var(--muted); background:var(--muted-bg); }
  .spinner { width:13px; height:13px; border:2px solid currentColor; border-right-color:transparent; border-radius:50%; animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  .addcol-head { position:sticky; top:0; z-index:11; background:var(--surface-2); border-bottom:1px solid var(--border-strong); border-right:1px solid var(--border); min-width:150px; width:150px; display:flex; align-items:center; justify-content:center; }
  .addcol-head button { display:inline-flex; align-items:center; gap:6px; height:32px; padding:0 12px; border-radius:7px; border:1px dashed var(--border-strong); background:transparent; color:var(--fg-soft); font-size:12.5px; font-weight:500; }
  .addcol-head button:hover { border-color:var(--primary); color:var(--primary); background:var(--found-bg); }
  .addcol-head button svg { width:15px; height:15px; }
  .addcol-body { border-right:1px solid var(--border); border-bottom:1px solid var(--border); background:var(--surface); }

  /* ============================================================
     GLOBAL CONTACTS VIEW  (все контакты всех компаний)
     ============================================================ */
  .contacts-view-inner { padding:0; }
  .filterbar { position:sticky; top:0; z-index:15; background:var(--surface); border-bottom:1px solid var(--border); padding:12px 18px; display:flex; flex-direction:column; gap:11px; }
  .filterbar .fb-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .filterbar .fb-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); min-width:70px; }
  .chip-set { display:flex; gap:6px; flex-wrap:wrap; }
  .fchip { display:inline-flex; align-items:center; gap:5px; height:28px; padding:0 11px; border-radius:20px; border:1px solid var(--border-strong); background:var(--surface); color:var(--fg-soft); font-size:12px; font-weight:500; transition:all .13s; }
  .fchip:hover { border-color:var(--muted); }
  .fchip.on { border-color:var(--primary); background:var(--found-bg); color:var(--primary-700); font-weight:600; }
  .fchip .fc-dot { width:8px; height:8px; border-radius:50%; }
  .fb-actions { margin-left:auto; display:flex; align-items:center; gap:8px; }
  .fb-result { font-size:12.5px; color:var(--fg-soft); }
  .fb-result b { color:var(--fg); }

  .ctable-wrap { overflow-x:auto; }
  table.ctable { border-collapse:separate; border-spacing:0; width:100%; min-width:900px; font-size:13px; }
  table.ctable thead th { position:sticky; top:0; z-index:5; text-align:left; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.03em; color:var(--muted); background:var(--surface-2); padding:9px 14px; border-bottom:1px solid var(--border-strong); white-space:nowrap; }
  table.ctable tbody td { padding:10px 14px; border-bottom:1px solid var(--border); background:var(--surface); vertical-align:middle; }
  table.ctable tbody tr:hover td { background:var(--surface-2); }
  table.ctable .c-email { font-family:var(--mono); font-size:12px; color:var(--primary-700); }
  table.ctable .c-open { color:var(--muted); font-family:var(--mono); font-size:12px; }
  table.ctable .c-name { font-weight:600; }
  table.ctable .c-desc { color:var(--fg-soft); font-size:12px; max-width:260px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  table.ctable .c-company { display:flex; align-items:center; gap:8px; }
  .tagchip { display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:500; padding:2px 9px; border-radius:6px; background:var(--muted-bg); color:var(--fg-soft); white-space:nowrap; }
  .tagchip .td-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .lvlchip { display:inline-flex; align-items:center; font-size:11.5px; font-weight:600; padding:2px 9px; border-radius:20px; white-space:nowrap; }
  .lvlchip.l0 { color:#7C2D12; background:#FFEDD5; } /* Владелец/основатель */
  .lvlchip.l1 { color:#5B21B6; background:#EDE9FE; } /* Топ-менеджмент */
  .lvlchip.l2 { color:#1E40AF; background:#DBEAFE; } /* Рук. отдела */
  .lvlchip.l3 { color:var(--fg-soft); background:var(--muted-bg); } /* Специалист */
  html[data-theme="dark"] .lvlchip.l0 { color:#FDBA74; background:#3A1E0C; }
  html[data-theme="dark"] .lvlchip.l1 { color:#C4B5FD; background:#241944; }
  html[data-theme="dark"] .lvlchip.l2 { color:#93C5FD; background:#132347; }
  .src-tag { font-size:11px; color:var(--muted); display:inline-flex; align-items:center; gap:5px; }
  .src-tag svg { width:12px; height:12px; }
  .empty-row td { text-align:center; color:var(--muted); padding:40px; font-size:13px; }

  /* ============================================================
     DRAWER
     ============================================================ */
  .scrim { position:fixed; inset:0; background:rgba(15,23,42,.5); opacity:0; pointer-events:none; transition:opacity .25s; z-index:50; }
  .scrim.show { opacity:1; pointer-events:auto; }
  .drawer { position:fixed; top:0; right:0; height:100vh; width:460px; max-width:94vw; background:var(--surface); border-left:1px solid var(--border); box-shadow:var(--shadow-lg); z-index:60; transform:translateX(100%); transition:transform .28s cubic-bezier(.4,0,.2,1); display:flex; flex-direction:column; }
  .drawer.show { transform:translateX(0); }
  .drawer .dh { display:flex; align-items:center; gap:10px; padding:16px 18px; border-bottom:1px solid var(--border); }
  .drawer .dh .favicon { width:30px; height:30px; border-radius:8px; }
  .drawer .dh .t { font-weight:600; font-size:14px; }
  .drawer .dh .s { font-size:12px; color:var(--muted); }
  .drawer .dh .x { margin-left:auto; width:30px; height:30px; border-radius:7px; border:0; background:var(--muted-bg); color:var(--fg-soft); display:grid; place-items:center; }
  .drawer .dh .x:hover { background:var(--border); }
  .drawer .db { padding:16px 18px; overflow-y:auto; flex:1; }
  .dsub { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); margin-bottom:12px; }
  .dsub > svg { width:15px; height:15px; flex-shrink:0; }
  .dsub .dpill { background:var(--muted-bg); color:var(--fg-soft); padding:2px 9px; border-radius:20px; font-weight:600; }

  .contact-card { border:1px solid var(--border); border-radius:11px; padding:12px 13px; margin-bottom:10px; background:var(--surface); transition:border-color .13s; }
  .contact-card:hover { border-color:var(--border-strong); }
  .cc-top { display:flex; align-items:flex-start; gap:11px; }
  .cc-ava { width:38px; height:38px; border-radius:50%; flex-shrink:0; display:grid; place-items:center; color:#fff; font-weight:600; font-size:14px; }
  .cc-main { flex:1; min-width:0; }
  .cc-name { font-weight:600; font-size:14px; }
  .cc-title { font-size:12px; color:var(--fg-soft); margin-top:1px; }
  .cc-tags { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
  .cc-email { display:flex; align-items:center; gap:8px; margin-top:10px; padding-top:10px; border-top:1px dashed var(--border); }
  .cc-email > svg { width:16px; height:16px; color:var(--muted); flex-shrink:0; }
  .cc-src > svg { width:12px; height:12px; flex-shrink:0; }
  .cc-email .em { font-family:var(--mono); font-size:12px; color:var(--primary-700); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .cc-src { font-size:11px; color:var(--muted); display:inline-flex; align-items:center; gap:5px; margin-top:9px; }
  .cc-src svg { width:12px; height:12px; }
  .cc-src a { color:var(--primary); text-decoration:none; }
  .cc-src a:hover { text-decoration:underline; }
  .drawer-filter { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }

  /* ============================================================
     MODAL
     ============================================================ */
  .modal { position:fixed; inset:0; z-index:70; display:grid; place-items:center; padding:20px; background:rgba(15,23,42,.5); opacity:0; pointer-events:none; transition:opacity .2s; }
  .modal.show { opacity:1; pointer-events:auto; }
  .modal .panel { background:var(--surface); border-radius:14px; box-shadow:var(--shadow-lg); width:560px; max-width:100%; max-height:92vh; overflow:hidden; display:flex; flex-direction:column; transform:scale(.96) translateY(8px); transition:transform .2s; border:1px solid var(--border); }
  .modal.show .panel { transform:scale(1) translateY(0); }
  .modal .mh { display:flex; align-items:center; gap:10px; padding:18px 20px 14px; border-bottom:1px solid var(--border); }
  .modal .mh .mic { width:32px; height:32px; border-radius:8px; background:var(--found-bg); color:var(--primary); display:grid; place-items:center; }
  .modal .mh .mic svg { width:18px; height:18px; }
  .modal .mh .t { font-weight:600; font-size:15px; }
  .modal .mh .s { font-size:12.5px; color:var(--muted); }
  .modal .mh .x { margin-left:auto; width:30px; height:30px; border-radius:7px; border:0; background:transparent; color:var(--muted); display:grid; place-items:center; }
  .modal .mh .x:hover { background:var(--muted-bg); color:var(--fg); }
  .modal .mb { padding:18px 20px; overflow-y:auto; }

document.getElementById('tabContacts').innerHTML = I.users+' Контакты';
document.getElementById('addColBtn').innerHTML = I.plus+' Новый столбец';

/* ============================================================ RENDER: TABLE ============================================================ */
const grid = document.getElementById('grid');
function render(){
  grid.style.gridTemplateColumns = `var(--domain-w) ${columns.map(()=>'var(--col-w)').join(' ')} 150px`;
  let h='';
  h += `<div class="cell hcell col-domain corner"><div class="domain-head"><span class="ic">${I.globe}</span><span class="lbl">Домен</span><span class="spacer"></span><span class="badge-count">${domains.length}</span></div></div>`;
  columns.forEach(col=>{
    const t=COL_TYPES[col.type]||COL_TYPES.ai;
    let sub;
    if(col.type==='contacts'){ const src=col.config.sources.map(srcLabel).slice(0,3).join(', '); sub=`${I.filter}<span style="overflow:hidden;text-overflow:ellipsis">Источники: ${escapeHtml(src)}…</span>`; }
    else sub=`${col.prompt?'<span class="pic">'+I.sparkles+'</span>':''}<span style="overflow:hidden;text-overflow:ellipsis">${escapeHtml(col.prompt||'')}</span>`;
    h += `<div class="cell hcell"><div class="data-head">
      <div class="top"><span class="typeic" style="background:${t.color}">${t.icon}</span><span class="cname">${escapeHtml(col.name)}</span><button class="menu-btn">${I.dots}</button></div>
      <div class="prompt-line">${sub}</div>
      <div class="foot"><span class="modeltag"><span class="gd"></span>${escapeHtml(col.model)}</span><button class="runcol">${I.play}<span>Обновить</span></button></div>
    </div></div>`;
  });
  h += `<div class="cell addcol-head"><button data-act="addcol">${I.plus} Столбец</button></div>`;
  domains.forEach(d=>{
    h += `<div class="cell col-domain"><div class="domain-cell"><span class="favicon" style="background:${d.color}">${(d.name||d.domain)[0]}</span><span class="meta"><span class="d-name">${escapeHtml(d.name)}</span><span class="d-url">${escapeHtml(d.domain)}</span></span><span class="d-status"><span class="dot ok"></span></span></div></div>`;
    columns.forEach(col=>{
      if(col.type==='contacts'){
        const n=d.contacts.length, em=d.contacts.filter(c=>c.email).length;
        h += `<div class="cell data-cell" data-act="contacts" data-dom="${d.id}"><div class="inner"><div class="contacts-sum">
          <span class="cs-ic">${I.users}</span>
          <span class="cs-meta"><span class="cs-n">${n} контакт${n%10===1&&n%100!==11?'':(n%10>=2&&n%10<=4&&(n%100<10||n%100>=20)?'а':'ов')}</span><span class="cs-sub">${em} email найдено</span></span>
          <span class="cs-arrow">${I.chevron}</span>
        </div></div></div>`;
      } else {
        const leader = d.contacts.find(c=>c.level==='owner'||c.level==='top');
        h += `<div class="cell data-cell"><div class="inner"><div class="cell-val"><div class="v">${leader?escapeHtml(leader.name):'—'}</div></div></div></div>`;
      }
    });
    h += `<div class="cell addcol-body"></div>`;
  });
  grid.innerHTML=h;
  updateCounts();
}
function updateCounts(){
  const all=allContacts();
  document.getElementById('cntDomains').textContent=domains.length;
  document.getElementById('cntContacts').textContent=all.length;
  document.getElementById('cntEmails').textContent=all.filter(c=>c.email).length;
}

/* ============================================================ RENDER: GLOBAL CONTACTS VIEW ============================================================ */
function renderFilterbar(){
  const fb=document.getElementById('filterbar');
  const depChips = DEPARTMENTS.map(d=>`<button class="fchip ${flt.departments.has(d.id)?'on':''}" data-flt="dep" data-id="${d.id}"><span class="fc-dot" style="background:${d.color}"></span>${d.label}</button>`).join('');
  const lvlChips = LEVELS.map(l=>`<button class="fchip ${flt.levels.has(l.id)?'on':''}" data-flt="lvl" data-id="${l.id}">${l.label}</button>`).join('');
  const valChips = VALIDATIONS.map(v=>`<button class="fchip ${flt.validations.has(v.id)?'on':''}" data-flt="val" data-id="${v.id}">${v.label}</button>`).join('');
  const total = allContacts().length, shown = allContacts().filter(contactMatches).length;
  const active = flt.departments.size+flt.levels.size+flt.validations.size;
  fb.innerHTML = `
    <div class="fb-row"><span class="fb-label">Отдел</span><div class="chip-set">${depChips}</div></div>
    <div class="fb-row"><span class="fb-label">Уровень</span><div class="chip-set">${lvlChips}</div>
      <div class="fb-actions">
        <span class="fb-result">Показано <b>${shown}</b> из ${total}</span>
        ${active?`<button class="btn ghost" style="height:30px" data-flt="clear">Сбросить (${active})</button>`:''}
      </div>
    </div>
    <div class="fb-row"><span class="fb-label">Валидация</span><div class="chip-set">${valChips}</div></div>`;
}
function renderContactsTable(){
  document.getElementById('cthead').innerHTML = `<tr>
    <th>Email</th><th>Валидация</th><th>Имя</th><th>Должность</th><th>Компания</th><th>Отдел</th><th>Уровень</th><th>Источник</th></tr>`;
  const rows = allContacts().filter(contactMatches);
  const tb=document.getElementById('ctbody');
  if(!rows.length){ tb.innerHTML=`<tr class="empty-row"><td colspan="8">Под выбранные фильтры контактов нет. Сбросьте часть условий.</td></tr>`; return; }
  tb.innerHTML = rows.map(c=>{
    const d=dep(c.department), l=lvl(c.level), v=val(c.validation);
    const email = c.email ? `<span class="c-email">${escapeHtml(c.email)}</span>` : `<span class="c-open">Открыть ✉</span>`;
    return `<tr>
      <td>${email}</td>
      <td><span class="badge ${v.badge}">${v.icon}${v.label}</span></td>
      <td class="c-name">${escapeHtml(c.name)}</td>
      <td class="c-desc" title="${escapeHtml(c.title)}">${escapeHtml(c.title)}</td>
      <td><span class="c-company"><span class="favicon" style="background:${c.color};width:18px;height:18px;border-radius:5px;font-size:9px">${(c.company)[0]}</span>${escapeHtml(c.company)}</span></td>
      <td><span class="tagchip"><span class="td-dot" style="background:${d.color}"></span>${d.label}</span></td>
      <td><span class="lvlchip ${l.cls}">${l.label}</span></td>
      <td><span class="src-tag">${I.link}${escapeHtml(srcLabel(c.source))}</span></td>
    </tr>`;
  }).join('');
}
function renderContactsView(){ renderFilterbar(); renderContactsTable(); }

/* ============================================================ DRAWER (per domain) ============================================================ */
const drawer=document.getElementById('drawer'), scrim=document.getElementById('scrim');
let drawerDomId=null, drawerFilterDep=null;
function openContactsDrawer(domId){
  drawerDomId=domId; drawerFilterDep=null;
  renderDrawer();
  drawer.classList.add('show'); scrim.classList.add('show');
}
function renderDrawer(){
  const d=domains.find(x=>x.id===drawerDomId); if(!d) return;
  let list=d.contacts.slice();
  if(drawerFilterDep) list=list.filter(c=>c.department===drawerFilterDep);
  const em=d.contacts.filter(c=>c.email).length;
  const usedDeps=[...new Set(d.contacts.map(c=>c.department))];
  const depFilter = usedDeps.length>1 ? `<div class="drawer-filter">
      <button class="mini-chip ${!drawerFilterDep?'on':''}" data-ddep="">Все (${d.contacts.length})</button>
      ${usedDeps.map(id=>`<button class="mini-chip ${drawerFilterDep===id?'on':''}" data-ddep="${id}">${dep(id).label}</button>`).join('')}
    </div>` : '';
  const cards = list.map(c=>{
    const dp=dep(c.department), l=lvl(c.level), v=val(c.validation);
    return `<div class="contact-card">
      <div class="cc-top">
        <span class="cc-ava" style="background:${dp.color}">${initials(c.name)}</span>
        <div class="cc-main">
          <div class="cc-name">${escapeHtml(c.name)}</div>
          <div class="cc-title">${escapeHtml(c.title)}</div>
          <div class="cc-tags">
            <span class="tagchip"><span class="td-dot" style="background:${dp.color}"></span>${dp.label}</span>
            <span class="lvlchip ${l.cls}">${l.label}</span>
          </div>
        </div>
      </div>
      <div class="cc-email">
        ${I.mail}
        <span class="em">${c.email?escapeHtml(c.email):'почта не найдена'}</span>
        <span class="badge ${v.badge}">${v.icon}${v.label}</span>
      </div>
      <div class="cc-src">${I.link} Источник: <a href="${escapeHtml(c.url)}" target="_blank" rel="noopener">${escapeHtml(srcLabel(c.source))}</a></div>
    </div>`;
  }).join('');
  drawer.innerHTML = `
    <div class="dh">
      <span class="favicon" style="background:${d.color};width:30px;height:30px;border-radius:8px">${(d.name)[0]}</span>
      <div><div class="t">${escapeHtml(d.name)}</div><div class="s">${escapeHtml(d.domain)}</div></div>
      <button class="x" id="drawerClose">${I.x}</button>
    </div>
    <div class="db">
      <div class="dsub">${I.users}<span class="dpill">${d.contacts.length} контактов</span><span class="dpill">${em} email</span></div>
      ${depFilter}
      ${cards}
    </div>`;
  document.getElementById('drawerClose').onclick=closeDrawer;
}
function closeDrawer(){ drawer.classList.remove('show'); scrim.classList.remove('show'); }
scrim.onclick=closeDrawer;

/* ============================================================ MODAL: new column ============================================================ */
const modalRoot=document.getElementById('modalRoot'), modalPanel=document.getElementById('modalPanel');
function openModal(html){ modalPanel.innerHTML=html; modalRoot.classList.add('show'); }
function closeModal(){ modalRoot.classList.remove('show'); }
modalRoot.addEventListener('click',e=>{ if(e.target===modalRoot) closeModal(); });

let ncType='contacts';
let ncCfg={ sources:new Set(['site','setka','tenchat','hh','linkedin']), departments:new Set(), levels:new Set(), verify:true };
function openAddColumn(){
  ncType='contacts';
  ncCfg={ sources:new Set(['site','setka','tenchat','hh','linkedin']), departments:new Set(), levels:new Set(), verify:true };
  const typeCards = Object.entries(COL_TYPES).map(([k,v])=>`
    <div class="type-opt ${k===ncType?'sel':''}" data-type="${k}">
      <div class="ti" style="background:${v.color}">${v.icon}</div>
      <div class="tt">${v.label}</div><div class="td">${v.desc}</div>
    </div>`).join('');
  openModal(`
    <div class="mh"><span class="mic">${I.users}</span>
      <div><div class="t">Новый столбец</div><div class="s">Настройка применится ко всем доменам таблицы</div></div>
      <button class="x" data-close>${I.x}</button></div>
    <div class="mb">
      <div class="field"><label>Тип столбца</label><div class="type-grid">${typeCards}</div></div>
      <div class="field"><label for="ncName">Название столбца</label><input type="text" id="ncName" value="Контакты и лица" /></div>
      <div id="ncBody"></div>
    </div>
    <div class="mf">
      <div class="mf-note">${I.sparkles}<span id="ncSummary"></span></div>
      <button class="btn ghost" data-close>Отмена</button>
      <button class="btn primary" id="ncCreate">${I.play} Создать и запустить</button>
    </div>`);
  renderNcBody();
  // type switching
  modalPanel.querySelectorAll('.type-opt').forEach(el=>el.onclick=()=>{
    ncType=el.dataset.type;
    modalPanel.querySelectorAll('.type-opt').forEach(x=>x.classList.toggle('sel',x===el));
    const nameEl=document.getElementById('ncName');
    if(ncType==='contacts'&&(!nameEl.value||nameEl.value==='Новый столбец')) nameEl.value='Контакты и лица';
    renderNcBody();
  });
  document.getElementById('ncCreate').onclick=()=>{
    closeModal();
    if(ncType==='contacts') toast('Столбец «Контакты» создан · поиск запущен по '+ncCfg.sources.size+' источникам');
    else toast('Столбец создан');
  };
  modalPanel.querySelectorAll('[data-close]').forEach(b=>b.onclick=closeModal);
}

function renderNcBody(){
  const body=document.getElementById('ncBody');
  if(ncType!=='contacts'){
    body.innerHTML=`
      <div class="field"><label for="ncPrompt">Промпт — что искать на каждом сайте</label>
        <textarea id="ncPrompt" style="min-height:80px" placeholder="Опишите, что нужно извлечь. Можно использовать {{Company Name}}, {{Website}}."></textarea>
        <div class="hint">Классический режим: одно значение на домен (как сейчас).</div></div>`;
    updateNcSummary(); return;
  }
  const srcOpts = SOURCES.map(s=>`
    <div class="src-opt ${ncCfg.sources.has(s.id)?'on':''}" data-src="${s.id}">
      <span class="so-check">${I.check}</span>
      <span class="so-ic">${s.ic}</span>
      <span class="so-lbl">${s.label}</span>
    </div>`).join('');
  const depChips = DEPARTMENTS.map(d=>`<button class="mini-chip ${ncCfg.departments.has(d.id)?'on':''}" data-ncdep="${d.id}">${d.label}</button>`).join('');
  const lvlChips = LEVELS.map(l=>`<button class="mini-chip ${ncCfg.levels.has(l.id)?'on':''}" data-nclvl="${l.id}">${l.label}</button>`).join('');
  body.innerHTML = `
    <div class="field">
      <label>Где искать людей и упоминания компании</label>
      <div class="src-grid">${srcOpts}</div>
      <div class="hint">Название компании определяется по домену, затем идёт веб-поиск по выбранным площадкам + LLM-разбор выдачи.</div>
    </div>
    <div class="field">
      <label>Кого оставлять — отдел / направление <span style="font-weight:400;color:var(--muted)">(необязательно)</span></label>
      <div class="mini-chips">${depChips}</div>
    </div>
    <div class="field">
      <label>Уровень влияния <span style="font-weight:400;color:var(--muted)">(необязательно)</span></label>
      <div class="mini-chips">${lvlChips}</div>
    </div>
    <div class="field">
      <div class="toggle-row">
        <span class="so-ic" style="color:var(--primary);width:18px;height:18px">${I.shieldCheck}</span>
        <div class="tr-txt"><div class="tr-t">Проверять корпоративные email</div><div class="tr-s">Подбор почт по имени+домену и MX/SMTP-проверка → бейдж «Надёжный / Рискованный»</div></div>
        <button class="switch ${ncCfg.verify?'on':''}" id="ncVerify" aria-label="Проверять email"></button>
      </div>
    </div>
    <div class="section-sep">Или начните с готового шаблона</div>
    <div class="preset-list">
      <div class="preset" data-preset="lpr"><span class="pi">${I.briefcase}</span><div><div class="pt">ЛПР и руководство</div><div class="pd">Только владельцы и топ-менеджмент, с проверкой почт</div></div></div>
      <div class="preset" data-preset="mkt"><span class="pi">${I.sparkles}</span><div><div class="pt">Отдел маркетинга</div><div class="pd">Маркетинг + PR, любой уровень</div></div></div>
      <div class="preset" data-preset="all"><span class="pi">${I.users}</span><div><div class="pt">Все контакты</div><div class="pd">Все отделы и уровни со всех площадок</div></div></div>
    </div>`;
  // source toggles
  body.querySelectorAll('.src-opt').forEach(el=>el.onclick=()=>{
    const id=el.dataset.src; ncCfg.sources.has(id)?ncCfg.sources.delete(id):ncCfg.sources.add(id);
    el.classList.toggle('on'); updateNcSummary();
  });
  body.querySelectorAll('[data-ncdep]').forEach(el=>el.onclick=()=>{
    const id=el.dataset.ncdep; ncCfg.departments.has(id)?ncCfg.departments.delete(id):ncCfg.departments.add(id);
    el.classList.toggle('on'); updateNcSummary();
  });
  body.querySelectorAll('[data-nclvl]').forEach(el=>el.onclick=()=>{
    const id=el.dataset.nclvl; ncCfg.levels.has(id)?ncCfg.levels.delete(id):ncCfg.levels.add(id);
    el.classList.toggle('on'); updateNcSummary();
  });
  body.querySelector('#ncVerify').onclick=e=>{ ncCfg.verify=!ncCfg.verify; e.currentTarget.classList.toggle('on',ncCfg.verify); updateNcSummary(); };
  body.querySelectorAll('[data-preset]').forEach(el=>el.onclick=()=>applyPreset(el.dataset.preset));
  updateNcSummary();
}
function applyPreset(kind){
  if(kind==='lpr'){ ncCfg.departments=new Set(); ncCfg.levels=new Set(['owner','top']); ncCfg.verify=true; document.getElementById('ncName').value='ЛПР и руководство'; }
  if(kind==='mkt'){ ncCfg.departments=new Set(['mkt','pr']); ncCfg.levels=new Set(); document.getElementById('ncName').value='Отдел маркетинга'; }
  if(kind==='all'){ ncCfg.departments=new Set(); ncCfg.levels=new Set(); ncCfg.sources=new Set(SOURCES.map(s=>s.id)); document.getElementById('ncName').value='Все контакты'; }
  renderNcBody();
}
function updateNcSummary(){
  const el=document.getElementById('ncSummary'); if(!el) return;
  if(ncType!=='contacts'){ el.textContent='Классический AI-столбец'; return; }
  const parts=[`${ncCfg.sources.size} источников`];
  parts.push(ncCfg.departments.size?`${ncCfg.departments.size} отд.`:'все отделы');
  parts.push(ncCfg.levels.size?`${ncCfg.levels.size} ур.`:'все уровни');
  if(ncCfg.verify) parts.push('валидация вкл.');
  el.textContent=parts.join(' · ');
}

/* ============================================================ VIEW SWITCH ============================================================ */
function setView(v){
  currentView=v;
  document.getElementById('viewTable').classList.toggle('hidden', v!=='table');
  document.getElementById('viewContacts').classList.toggle('hidden', v!=='contacts');
  document.getElementById('tabTable').classList.toggle('active', v==='table');
  document.getElementById('tabContacts').classList.toggle('active', v==='contacts');
  if(v==='contacts') renderContactsView();
}

/* ============================================================ EVENTS ============================================================ */
document.getElementById('themeBtn').onclick=()=>{
  const el=document.documentElement; el.dataset.theme = el.dataset.theme==='dark'?'':'dark';
};
document.getElementById('tabTable').onclick=()=>setView('table');
document.getElementById('tabContacts').onclick=()=>setView('contacts');
document.getElementById('addColBtn').onclick=openAddColumn;
document.getElementById('runAllBtn').onclick=()=>toast('Пайплайн запущен для всех столбцов');
document.getElementById('exportBtn').onclick=()=>toast('Экспорт контактов в CSV');

grid.addEventListener('click',e=>{
  const cell=e.target.closest('[data-act]'); if(!cell) return;
  const act=cell.dataset.act;
  if(act==='contacts') openContactsDrawer(cell.dataset.dom);
  else if(act==='addcol') openAddColumn();
});

document.getElementById('filterbar').addEventListener('click',e=>{
  const b=e.target.closest('[data-flt]'); if(!b) return;
  const kind=b.dataset.flt;
  if(kind==='clear'){ flt.departments.clear(); flt.levels.clear(); flt.validations.clear(); }
  else { const set = kind==='dep'?flt.departments : kind==='lvl'?flt.levels : flt.validations;
    const id=b.dataset.id; set.has(id)?set.delete(id):set.add(id); }
  renderContactsView();
});

drawer.addEventListener('click',e=>{
  const b=e.target.closest('[data-ddep]'); if(!b) return;
  drawerFilterDep = b.dataset.ddep || null; renderDrawer();
});

/* ============================================================ INIT ============================================================ */
render();
setView('table');
// Deep-link состояний (удобно для демо/шаринга): #new, #contacts, #drawer
(function(){
  const h=(location.hash||'').replace('#','');
  if(h==='new') openAddColumn();
  else if(h==='contacts') setView('contacts');
  else if(h==='drawer') openContactsDrawer('d4');
})();
</script>
</body>
</html>
